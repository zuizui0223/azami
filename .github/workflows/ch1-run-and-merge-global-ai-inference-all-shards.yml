name: Ch1 run and merge all global automated AI shards

on:
  workflow_dispatch:
    inputs:
      queue_shards_artifact_id:
        description: "Partitioned global AI inference queue artifact ID"
        required: true
        default: "8085801076"
        type: string
      detector_model_artifact_id:
        description: "Bootstrap visible-capitulum detector artifact ID"
        required: true
        default: "8076736948"
        type: string
      merged_metadata_artifact_id:
        description: "Merged global iNaturalist metadata artifact ID"
        required: true
        default: "8066010557"
        type: string
      model_ids_csv:
        description: "Comma-separated CLIP owner/model IDs"
        required: true
        default: "openai/clip-vit-base-patch32,openai/clip-vit-base-patch16"
        type: string
      output_label:
        description: "Safe shared label for all shard and final artifacts"
        required: true
        default: "research_grade_216_species_v1"
        type: string

concurrency:
  group: ch1-global-ai-all-${{ inputs.output_label }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  preflight:
    name: Validate five-shard inference plan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pandas
      - name: Validate inputs and queue-shard manifest
        env:
          GH_TOKEN: ${{ github.token }}
          SHARDS_ARTIFACT_RAW: ${{ inputs.queue_shards_artifact_id }}
          DETECTOR_ARTIFACT_RAW: ${{ inputs.detector_model_artifact_id }}
          METADATA_ARTIFACT_RAW: ${{ inputs.merged_metadata_artifact_id }}
          MODELS_RAW: ${{ inputs.model_ids_csv }}
          LABEL_RAW: ${{ inputs.output_label }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import re

          def positive(raw, name):
              value = (raw or "").strip().replace(",", "").replace("_", "")
              if not re.fullmatch(r"[0-9]+", value) or int(value) < 1:
                  raise SystemExit(f"{name} must be a positive integer")
              return int(value)
          artifact_ids = {
              "QUEUE_SHARDS_ARTIFACT_ID": positive(os.environ["SHARDS_ARTIFACT_RAW"], "queue_shards_artifact_id"),
              "DETECTOR_MODEL_ARTIFACT_ID": positive(os.environ["DETECTOR_ARTIFACT_RAW"], "detector_model_artifact_id"),
              "MERGED_METADATA_ARTIFACT_ID": positive(os.environ["METADATA_ARTIFACT_RAW"], "merged_metadata_artifact_id"),
          }
          models = [item.strip() for item in (os.environ["MODELS_RAW"] or "").split(",") if item.strip()]
          if len(models) < 2 or len(models) != len(set(models)):
              raise SystemExit("model_ids_csv must contain at least two distinct models")
          if not all(re.fullmatch(r"[A-Za-z0-9._-]+/[A-Za-z0-9._-]+", model) for model in models):
              raise SystemExit("Each model must use owner/model format")
          label = (os.environ["LABEL_RAW"] or "").strip()
          if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9._-]{0,79}", label):
              raise SystemExit("output_label is invalid")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              for key, value in artifact_ids.items():
                  handle.write(f"{key}={value}\n")
              handle.write(f"MODEL_IDS_CSV={','.join(models)}\n")
              handle.write(f"OUTPUT_LABEL={label}\n")
          PY
          mkdir -p source/shards/extracted
          curl --fail --location --retry 4 --retry-all-errors --retry-delay 2 \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${QUEUE_SHARDS_ARTIFACT_ID}/zip" \
            --output source/shards/shards.zip
          unzip -tq source/shards/shards.zip
          unzip -q source/shards/shards.zip -d source/shards/extracted
          python - <<'PY'
          import pandas as pd
          manifest = pd.read_csv("source/shards/extracted/global_ai_inference_shard_manifest.csv", dtype=str, keep_default_na=False)
          ids = sorted(manifest["shard_id"].astype(int).tolist())
          if ids != [1, 2, 3, 4, 5]:
              raise SystemExit(f"This automatic workflow requires exactly shards 1..5, found {ids}")
          if manifest["n_observations"].astype(int).sum() < 1:
              raise SystemExit("Shard manifest has no observations")
          print({"n_shards": len(manifest), "n_observations": int(manifest["n_observations"].astype(int).sum())})
          PY

  run-shards:
    name: Run shard ${{ matrix.shard_id }}
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        shard_id: [1, 2, 3, 4, 5]
    env:
      HF_HUB_DISABLE_TELEMETRY: "1"
      TOKENIZERS_PARALLELISM: "false"
      PYTHONHASHSEED: "0"
      QUEUE_SHARDS_ARTIFACT_ID: ${{ inputs.queue_shards_artifact_id }}
      DETECTOR_MODEL_ARTIFACT_ID: ${{ inputs.detector_model_artifact_id }}
      MODEL_IDS_CSV: ${{ inputs.model_ids_csv }}
      OUTPUT_LABEL: ${{ inputs.output_label }}
      SHARD_ID: ${{ matrix.shard_id }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install image detector and ensemble dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas Pillow requests ultralytics torch 'transformers>=4.41,<5'

      - name: Download shard queue and detector model
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p source/shards/extracted source/model/extracted
          for specification in \
            "${QUEUE_SHARDS_ARTIFACT_ID}:source/shards/shards.zip:source/shards/extracted" \
            "${DETECTOR_MODEL_ARTIFACT_ID}:source/model/model.zip:source/model/extracted"; do
            IFS=':' read -r artifact_id zip_path extract_dir <<< "$specification"
            curl --fail --location --retry 4 --retry-all-errors --retry-delay 2 \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" \
              --output "$zip_path"
            unzip -tq "$zip_path"
            unzip -q "$zip_path" -d "$extract_dir"
          done
          WEIGHTS="$(find source/model/extracted -type f -name best.pt | head -n 1)"
          test -n "$WEIGHTS"
          echo "DETECTOR_WEIGHTS=$WEIGHTS" >> "$GITHUB_ENV"

      - name: Materialize queue shard
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import pandas as pd

          root = Path("source/shards/extracted")
          manifest = pd.read_csv(root / "global_ai_inference_shard_manifest.csv", dtype=str, keep_default_na=False)
          wanted = str(int(os.environ["SHARD_ID"]))
          match = manifest.loc[manifest["shard_id"].astype(str).eq(wanted)]
          if len(match) != 1:
              raise SystemExit(f"shard_id={wanted} is absent or ambiguous")
          queue = pd.read_csv(root / match.iloc[0]["filename"], dtype=str, keep_default_na=False)
          if queue.empty or queue["queue_id"].duplicated().any() or queue["obs_id"].duplicated().any():
              raise SystemExit("Selected queue shard is invalid")
          queue["audit_id"] = queue["queue_id"]
          queue.to_csv("queue_shard.csv", index=False, encoding="utf-8-sig")
          print({"shard_id": int(wanted), "n_observations": len(queue), "n_species": queue["taxon_name"].nunique()})
          PY

      - name: Download shard images at rate-limited cadence
        run: |
          python ch1_global/v2/06_download_inat_screening_queue.py \
            --queue queue_shard.csv \
            --out-dir downloads \
            --image-size medium \
            --sleep-sec 0.50 \
            --timeout-sec 60

      - name: Validate downloaded images
        run: |
          python - <<'PY'
          from pathlib import Path
          import pandas as pd
          from PIL import Image

          results = pd.read_csv("downloads/download_results.csv", dtype=str, keep_default_na=False)
          latest = results.assign(_order=range(len(results))).sort_values("_order").groupby("queue_id", as_index=False).tail(1)
          success = latest.loc[latest["download_status"].eq("success")].copy()
          if len(success) != len(latest):
              failed = latest.loc[~latest["download_status"].eq("success"), ["queue_id", "download_status", "http_status", "message"]].head(10).to_dict("records")
              raise SystemExit(f"Incomplete image download; no partial shard inference is allowed: {failed}")
          failures = []
          for _, row in success.iterrows():
              path = Path(row["image_local_path"])
              try:
                  with Image.open(path) as image:
                      image.verify()
              except Exception as error:
                  failures.append({"queue_id": row["queue_id"], "error": str(error)})
          if failures:
              raise SystemExit(f"Undecodable downloaded images: {failures[:10]}")
          print({"n_download_success": len(success)})
          PY

      - name: Detect visible capitula
        run: |
          python ch1_global/v2/07_screen_downloaded_images_with_yolo.py \
            --queue queue_shard.csv \
            --downloads downloads/download_results.csv \
            --images-dir downloads/images \
            --weights "$DETECTOR_WEIGHTS" \
            --out-dir detector \
            --conf 0.25 \
            --pad-ratio 0.12 \
            --batch-size 16 \
            --device cpu

      - name: Build head plus peduncle context crops
        run: |
          test -s detector/yolo_crop_metadata.csv
          python ch1_global/v2/18_build_head_context_crops.py \
            --crops detector/yolo_crop_metadata.csv \
            --images-dir downloads/images \
            --out-dir context \
            --context-pad-ratio 1.5
          python - <<'PY'
          import pandas as pd
          context = pd.read_csv("context/head_context_crop_metadata.csv", dtype=str, keep_default_na=False)
          if context.empty or not context["context_crop_status"].eq("success").all():
              raise SystemExit("Every detector crop must have a successful context crop")
          PY

      - name: Assemble local trait packet
        run: |
          python ch1_global/v2/28_build_detected_head_trait_packet.py \
            --yolo-crops detector/yolo_crop_metadata.csv \
            --context-metadata context/head_context_crop_metadata.csv \
            --source-images-dir downloads/images \
            --head-crops-dir detector/head_crops \
            --out-dir trait_packet_build \
            --batch-name "global_ai_${OUTPUT_LABEL}_shard_${SHARD_ID}"

      - name: Score all detected heads with AI ensemble
        shell: bash
        run: |
          set -euo pipefail
          model_args=()
          IFS=',' read -r -a models <<< "$MODEL_IDS_CSV"
          for model_id in "${models[@]}"; do
            model_args+=(--model-id "$model_id")
          done
          python ch1_global/v2/35_score_traits_ai_ensemble.py \
            --packet-manifest trait_packet_build/trait_annotation_packet/blinded_trait_annotation_manifest.csv \
            --packet-root trait_packet_build/trait_annotation_packet \
            --ontology ch1_global/v2/ontology/ch1_trait_ontology.csv \
            --prompt-spec ch1_global/v2/ontology/clip_trait_prompt_spec.json \
            --out-dir trait_ai_ensemble \
            "${model_args[@]}" \
            --device cpu \
            --batch-size 24 \
            --threads 2 \
            --seed 20260705 \
            --strict-margin-percentile 0.50 \
            --majority-vote-fraction 0.75

      - name: Validate compact shard result
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          queue = pd.read_csv("queue_shard.csv", dtype=str, keep_default_na=False)
          crops = pd.read_csv("detector/yolo_crop_metadata.csv", dtype=str, keep_default_na=False)
          long = pd.read_csv("trait_ai_ensemble/ai_ensemble_trait_measurements_long.csv", dtype=str, keep_default_na=False)
          variants = pd.read_csv("trait_ai_ensemble/ai_ensemble_variant_predictions.csv", dtype=str, keep_default_na=False)
          provenance = json.loads(Path("trait_ai_ensemble/ai_ensemble_measurement_provenance.json").read_text(encoding="utf-8"))
          n_heads = crops[["audit_id", "det_index"]].drop_duplicates().shape[0]
          if n_heads < 1 or len(long) != n_heads * 8 or long.duplicated(["annotation_unit_id", "trait_id"]).any():
              raise SystemExit("Automated trait table does not cover each detected head and trait exactly once")
          if len(variants) != n_heads * 7 * len(provenance["model_locks"]) * 2:
              raise SystemExit("Variant prediction row count is invalid")
          report = {
              "shard_id": int("${{ matrix.shard_id }}"),
              "n_queue_observations": int(len(queue)),
              "n_detected_heads": int(n_heads),
              "n_ai_trait_rows": int(len(long)),
              "n_variant_predictions": int(len(variants)),
              "model_locks": provenance["model_locks"],
          }
          Path("shard_run_summary.json").write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Upload compact shard result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ch1-global-ai-inference-shard-${{ inputs.output_label }}-${{ matrix.shard_id }}
          path: |
            queue_shard.csv
            downloads/download_results.csv
            downloads/download_manifest.json
            detector/screening_results.csv
            detector/yolo_crop_metadata.csv
            trait_packet_build/trait_packet_report.json
            trait_ai_ensemble
            shard_run_summary.json
          if-no-files-found: warn
          retention-days: 90

  merge-and-build-analysis-units:
    name: Merge five shards and build global observation table
    needs: run-shards
    if: ${{ needs.run-shards.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      QUEUE_SHARDS_ARTIFACT_ID: ${{ inputs.queue_shards_artifact_id }}
      MERGED_METADATA_ARTIFACT_ID: ${{ inputs.merged_metadata_artifact_id }}
      OUTPUT_LABEL: ${{ inputs.output_label }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install pandas

      - name: Download queue shards and global metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p source/shards/extracted source/metadata/extracted
          for specification in \
            "${QUEUE_SHARDS_ARTIFACT_ID}:source/shards/shards.zip:source/shards/extracted" \
            "${MERGED_METADATA_ARTIFACT_ID}:source/metadata/metadata.zip:source/metadata/extracted"; do
            IFS=':' read -r artifact_id zip_path extract_dir <<< "$specification"
            curl --fail --location --retry 4 --retry-all-errors --retry-delay 2 \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" \
              --output "$zip_path"
            unzip -tq "$zip_path"
            unzip -q "$zip_path" -d "$extract_dir"
          done
          test -s source/shards/extracted/global_ai_inference_shard_manifest.csv
          test -s source/metadata/extracted/photo_metadata_merged.csv

      - name: Download all current-run shard result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ch1-global-ai-inference-shard-${{ inputs.output_label }}-*
          path: source/results
          merge-multiple: false

      - name: Merge shard outputs
        run: |
          python ch1_global/v2/41_merge_global_ai_inference_shards.py \
            --shard-manifest source/shards/extracted/global_ai_inference_shard_manifest.csv \
            --shard-results-root source/results \
            --out-dir merged_shards

      - name: Build global photo and observation analysis units
        run: |
          python ch1_global/v2/37_build_ai_trait_analysis_units.py \
            --ai-measurements-long merged_shards/global_ai_merged_trait_measurements_long.csv \
            --detector-crop-metadata merged_shards/global_ai_merged_yolo_crop_metadata.csv \
            --inat-photo-metadata source/metadata/extracted/photo_metadata_merged.csv \
            --out-dir global_ai_analysis_units \
            --metadata-chunk-size 200000

      - name: Validate global merged trait tables
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          merged = json.loads(Path("merged_shards/global_ai_shard_merge_provenance.json").read_text(encoding="utf-8"))
          analysis = json.loads(Path("global_ai_analysis_units/ai_trait_analysis_units_provenance.json").read_text(encoding="utf-8"))
          observation = pd.read_csv("global_ai_analysis_units/ai_trait_observation_level_long.csv", dtype=str, keep_default_na=False)
          wide = pd.read_csv("global_ai_analysis_units/ai_trait_observation_level_wide.csv", dtype=str, keep_default_na=False)
          if observation.duplicated(["obs_id", "trait_id"]).any() or len(wide) != observation["obs_id"].nunique():
              raise SystemExit("Global observation table has broken nesting")
          if not merged["semantic_status"].startswith("Fully automated model-derived"):
              raise SystemExit("Merged table lost fully automated semantics")
          report = {
              "n_queue_observations": merged["n_queue_observations"],
              "n_detected_heads": merged["n_detected_heads"],
              "n_ai_trait_rows": merged["n_ai_trait_rows"],
              "n_observations_with_detected_heads": analysis["n_observations"],
              "n_observations_coordinate_usable": analysis["n_observations_coordinate_usable"],
          }
          Path("global_run_summary.json").write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY
          {
            echo "## Fully automated five-shard global AI run"
            echo
            echo '```json'
            cat global_run_summary.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload final global AI trait analysis artifact
        uses: actions/upload-artifact@v4
        with:
          name: ch1-global-ai-trait-analysis-${{ inputs.output_label }}
          path: |
            merged_shards
            global_ai_analysis_units
            global_run_summary.json
          if-no-files-found: error
          retention-days: 90
