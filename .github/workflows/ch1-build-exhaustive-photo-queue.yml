name: Ch1 build exhaustive all-photo queue

on:
  workflow_dispatch:
    inputs:
      merged_metadata_artifact_id:
        description: Artifact containing complete photo_metadata_merged.csv
        required: true
        type: string
      n_shards:
        description: Number of inference shards
        required: true
        default: "20"
        type: string
      quality_grades:
        description: Comma-separated iNaturalist quality grades
        required: true
        default: research
        type: string
      photo_licenses:
        description: Comma-separated licence codes or any
        required: true
        default: any
        type: string
      output_label:
        description: Safe artifact label
        required: true
        default: exhaustive_all_photos_v1
        type: string

permissions:
  actions: read
  contents: read

jobs:
  build-and-partition:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      METADATA_ARTIFACT_ID: ${{ inputs.merged_metadata_artifact_id }}
      N_SHARDS: ${{ inputs.n_shards }}
      QUALITY_GRADES: ${{ inputs.quality_grades }}
      PHOTO_LICENSES: ${{ inputs.photo_licenses }}
      OUTPUT_LABEL: ${{ inputs.output_label }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ch1_global/v2/requirements-submission.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas

      - name: Validate inputs
        run: |
          python - <<'PY'
          import os, re
          artifact = os.environ["METADATA_ARTIFACT_ID"].strip().replace(",", "").replace("_", "")
          shards = os.environ["N_SHARDS"].strip()
          label = os.environ["OUTPUT_LABEL"].strip()
          if not re.fullmatch(r"[0-9]+", artifact) or int(artifact) < 1:
              raise SystemExit("merged_metadata_artifact_id must be a positive integer")
          if not re.fullmatch(r"[0-9]+", shards) or not 1 <= int(shards) <= 100:
              raise SystemExit("n_shards must be an integer from 1 to 100")
          if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9._-]{0,79}", label):
              raise SystemExit("output_label is invalid")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"METADATA_ARTIFACT_ID={int(artifact)}\n")
              handle.write(f"N_SHARDS={int(shards)}\n")
          PY

      - name: Download complete metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p source/extracted
          curl --fail --location --retry 4 --retry-all-errors --retry-delay 2 \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${METADATA_ARTIFACT_ID}/zip" \
            --output source/metadata.zip
          unzip -tq source/metadata.zip
          unzip -q source/metadata.zip -d source/extracted
          mapfile -t matches < <(find source/extracted -type f -name photo_metadata_merged.csv | sort)
          test "${#matches[@]}" -eq 1
          echo "PHOTO_METADATA=${matches[0]}" >> "$GITHUB_ENV"
          sha256sum source/metadata.zip "${matches[0]}" | tee source/input_sha256.txt

      - name: Build exhaustive pre-prediction photo queue
        run: |
          python ch1_global/v2/71_build_within_species_expansion_queue.py \
            --input "$PHOTO_METADATA" \
            --out-dir exhaustive_queue \
            --quality-grades "$QUALITY_GRADES" \
            --photo-licenses "$PHOTO_LICENSES"

      - name: Partition every photo exactly once
        run: |
          python ch1_global/v2/39_partition_global_ai_inference_queue.py \
            --queue exhaustive_queue/exhaustive_photo_inference_queue.csv \
            --out-dir exhaustive_shards \
            --n-shards "$N_SHARDS" \
            --seed 20260711

      - name: Validate no pre-prediction thinning
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd
          queue = pd.read_csv("exhaustive_queue/exhaustive_photo_inference_queue.csv", dtype=str, keep_default_na=False)
          manifest = pd.read_csv("exhaustive_shards/global_ai_inference_shard_manifest.csv")
          report = json.loads(Path("exhaustive_queue/exhaustive_photo_queue_report.json").read_text())
          if len(queue) != report["n_queue_photos"]:
              raise SystemExit("Queue report does not match exhaustive photo table")
          if queue["photo_id"].duplicated().any() or queue["queue_id"].duplicated().any():
              raise SystemExit("Exhaustive queue contains duplicate photos")
          if int(manifest["n_photos"].sum()) != len(queue):
              raise SystemExit("Shard manifest does not preserve every photo exactly once")
          if set(queue["sampling_role"]) != {"exhaustive_pre_prediction"}:
              raise SystemExit("Queue lost exhaustive pre-prediction semantics")
          print({"n_photos": len(queue), "n_observations": queue["obs_id"].nunique(), "n_species": queue["taxon_name"].nunique(), "n_shards": len(manifest)})
          PY

      - name: Record provenance
        run: |
          cp source/input_sha256.txt exhaustive_queue/input_sha256.txt
          printf '%s\n' "$GITHUB_SHA" > exhaustive_queue/git_sha.txt
          python -m pip freeze > exhaustive_queue/python_environment.txt

      - name: Upload exhaustive queue and shards
        uses: actions/upload-artifact@v4
        with:
          name: ch1-exhaustive-photo-shards-${{ inputs.output_label }}
          path: |
            exhaustive_queue
            exhaustive_shards
          if-no-files-found: error
          retention-days: 90
