name: Ch1 QC join and involucre supplement

on:
  workflow_dispatch:
    inputs:
      continuous_artifact_id:
        description: Frozen corrected continuous primary-trait artifact ID
        required: true
        type: string
      environment_artifact_id:
        description: Frozen CHELSA environment artifact ID
        required: true
        type: string
      detector_metadata_artifact_id:
        description: Frozen artifact containing YOLO crop metadata
        required: true
        type: string
      output_label:
        description: Safe output label
        required: true
        default: submission_candidate
        type: string

permissions:
  actions: read
  contents: read

jobs:
  qc-join-involucre:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CONTINUOUS_ARTIFACT_ID: ${{ inputs.continuous_artifact_id }}
      ENVIRONMENT_ARTIFACT_ID: ${{ inputs.environment_artifact_id }}
      DETECTOR_METADATA_ARTIFACT_ID: ${{ inputs.detector_metadata_artifact_id }}
      OUTPUT_LABEL: ${{ inputs.output_label }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ch1_global/v2/requirements-submission.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ch1_global/v2/requirements-submission.txt
          python -m pip check

      - name: Validate request
        run: |
          python - <<'PY'
          import os, re
          identifiers = (
              "CONTINUOUS_ARTIFACT_ID",
              "ENVIRONMENT_ARTIFACT_ID",
              "DETECTOR_METADATA_ARTIFACT_ID",
          )
          normalized = {}
          for key in identifiers:
              value = os.environ[key].strip().replace(",", "").replace("_", "")
              if not re.fullmatch(r"[0-9]+", value) or int(value) < 1:
                  raise SystemExit(f"{key} must be a positive integer")
              normalized[key] = str(int(value))
          label = os.environ["OUTPUT_LABEL"].strip()
          if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9._-]{0,79}", label):
              raise SystemExit("output_label is invalid")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              for key, value in normalized.items():
                  handle.write(f"{key}={value}\n")
              handle.write(f"OUTPUT_LABEL={label}\n")
          PY

      - name: Download frozen input artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p source/continuous source/environment source/detector
          for pair in \
            "continuous:${CONTINUOUS_ARTIFACT_ID}" \
            "environment:${ENVIRONMENT_ARTIFACT_ID}" \
            "detector:${DETECTOR_METADATA_ARTIFACT_ID}"; do
            name="${pair%%:*}"
            artifact="${pair##*:}"
            curl --fail --location --retry 4 --retry-all-errors --retry-delay 2 \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact}/zip" \
              --output "source/${name}/${name}.zip"
            unzip -tq "source/${name}/${name}.zip"
            unzip -q "source/${name}/${name}.zip" -d "source/${name}/extracted"
          done
          sha256sum source/*/*.zip | tee source/input_artifact_sha256.txt

      - name: Resolve unambiguous input files
        run: |
          set -euo pipefail
          resolve_one() {
            local root="$1" pattern="$2" variable="$3"
            mapfile -t values < <(find "$root" -type f -name "$pattern" | sort)
            if [ "${#values[@]}" -ne 1 ]; then
              printf 'Expected exactly one %s below %s, found %s\n' "$pattern" "$root" "${#values[@]}" >&2
              printf '%s\n' "${values[@]}" >&2
              exit 1
            fi
            echo "${variable}=${values[0]}" >> "$GITHUB_ENV"
          }
          resolve_one source/continuous/extracted primary_trait_continuous_head_with_metadata.csv CONTINUOUS_HEAD
          resolve_one source/continuous/extracted primary_trait_continuous_observation_level.csv CONTINUOUS_OBSERVATION
          resolve_one source/continuous/extracted primary_trait_continuous_species_level.csv CONTINUOUS_SPECIES
          resolve_one source/environment/extracted global_ai_observation_environment_metadata.csv ENVIRONMENT_METADATA
          resolve_one source/detector/extracted global_ai_merged_yolo_crop_metadata.csv YOLO_METADATA

      - name: Audit QC bias and join environment
        run: |
          python ch1_global/v2/57_qc_bias_join_primary_continuous.py \
            --head "$CONTINUOUS_HEAD" \
            --observation "$CONTINUOUS_OBSERVATION" \
            --species "$CONTINUOUS_SPECIES" \
            --environment "$ENVIRONMENT_METADATA" \
            --out-dir qc_environment_join

      - name: Select high-resolution involucre subset
        run: |
          python ch1_global/v2/58_prepare_high_resolution_involucre_subset.py \
            --yolo-metadata "$YOLO_METADATA" \
            --out-csv involucre/high_resolution_yolo_metadata.csv \
            --report involucre/high_resolution_subset_report.json \
            --min-bbox-dimension 150

      - name: Reconstruct selected high-resolution crops
        run: |
          python ch1_global/v2/54_rebuild_global_continuous_trait_packet.py \
            --yolo-metadata involucre/high_resolution_yolo_metadata.csv \
            --out-dir involucre/rebuilt \
            --context-pad-ratio 1.5 \
            --timeout-sec 60 \
            --retries 4 \
            --sleep-sec 0.10

      - name: Measure exploratory involucre proxies
        run: |
          python ch1_global/v2/59_measure_involucre_auxiliary_continuous.py \
            --manifest involucre/rebuilt/continuous_trait_manifest.csv \
            --packet-root involucre/rebuilt \
            --metadata involucre/high_resolution_yolo_metadata.csv \
            --out-dir involucre/measurements \
            --min-dimension 150 \
            --min-sharpness 55 \
            --min-mask-quality 0.55

      - name: Prepare hair and mucilage evidence queue
        run: |
          python ch1_global/v2/60_prepare_microtrait_literature_queue.py \
            --species qc_environment_join/primary_continuous_species_environment.csv \
            --out-csv literature_microtraits/hair_mucilage_evidence_queue.csv \
            --schema-json literature_microtraits/hair_mucilage_evidence_schema.json

      - name: Build QC integration figures
        run: |
          python ch1_global/v2/61_build_trait_qc_integration_figures.py \
            --primary-qc qc_environment_join/qc_overall_summary.csv \
            --environment-gee qc_environment_join/qc_environment_species_clustered_gee.csv \
            --involucre-status involucre/measurements/involucre_auxiliary_status_summary.csv \
            --out-dir figures

      - name: Validate frozen dimensions and semantics
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          qc = json.loads(Path("qc_environment_join/qc_bias_and_join_report.json").read_text())
          observations = pd.read_csv("qc_environment_join/primary_continuous_observation_environment.csv", low_memory=False)
          species = pd.read_csv("qc_environment_join/primary_continuous_species_environment.csv", low_memory=False)
          subset = json.loads(Path("involucre/high_resolution_subset_report.json").read_text())
          auxiliary = pd.read_csv("involucre/measurements/involucre_auxiliary_head_level.csv", low_memory=False)
          queue = pd.read_csv("literature_microtraits/hair_mucilage_evidence_queue.csv")

          if qc["n_heads"] != 6626 or len(observations) != 3725 or len(species) != 216:
              raise SystemExit("Primary QC/join dimensions changed")
          if subset["n_selected_heads"] != 1819 or subset["n_selected_species"] != 214:
              raise SystemExit("High-resolution selection changed and requires review")
          if len(auxiliary) != 1819:
              raise SystemExit("Auxiliary output does not cover every selected head")
          usable = int(auxiliary["involucre_status"].eq("usable").sum())
          if usable != 1443:
              raise SystemExit(f"Usable involucre count changed: {usable}")
          if len(queue) != 432 or set(queue["trait_state"]) != {"unknown"}:
              raise SystemExit("Literature queue must contain two unknown rows per taxon")
          forbidden = {
              "selection_stratum", "ai_candidate_state",
              "observation_ai_all_state", "observation_ai_conservative_state",
          }
          leaked = forbidden.intersection(species.columns) | forbidden.intersection(observations.columns)
          if leaked:
              raise SystemExit(f"Legacy fields leaked into analysis-ready tables: {sorted(leaked)}")
          pngs = list(Path("figures").glob("*.png"))
          if not pngs or any(path.stat().st_size < 1000 for path in pngs):
              raise SystemExit("QC figures are missing or empty")
          print({
              "qc": qc,
              "high_resolution_subset": subset,
              "n_auxiliary_usable": usable,
          })
          PY

      - name: Record provenance and remove temporary images
        run: |
          cp source/input_artifact_sha256.txt qc_environment_join/input_artifact_sha256.txt
          printf '%s\n' "$GITHUB_SHA" > qc_environment_join/git_sha.txt
          python -m pip freeze > qc_environment_join/python_environment.txt
          rm -rf involucre/rebuilt/head_crops involucre/rebuilt/context_crops

      - name: Upload QC and involucre bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ch1-qc-environment-involucre-${{ env.OUTPUT_LABEL }}
          path: |
            qc_environment_join
            involucre/high_resolution_subset_report.json
            involucre/measurements
            literature_microtraits
            figures
          if-no-files-found: warn
          retention-days: 90
