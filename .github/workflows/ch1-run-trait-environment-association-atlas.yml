name: Ch1 run trait environment association atlas

on:
  workflow_dispatch:
    inputs:
      environment_artifact_id:
        description: "CHELSA-enriched global AI trait artifact ID"
        required: true
        type: string
      n_folds:
        description: "Requested grouped folds for spatial and held-out-species validation"
        required: true
        default: "5"
        type: string
      output_label:
        description: "Safe artifact label"
        required: true
        default: "research_grade_216_species_chelsa_association_v1"
        type: string

permissions:
  actions: read
  contents: read

jobs:
  association-atlas:
    name: Run spatial and species-aware climate association atlas
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install analysis dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas scikit-learn tabulate

      - name: Validate request
        env:
          ARTIFACT_RAW: ${{ inputs.environment_artifact_id }}
          FOLDS_RAW: ${{ inputs.n_folds }}
          LABEL_RAW: ${{ inputs.output_label }}
        run: |
          python - <<'PY'
          import os
          import re
          artifact = (os.environ["ARTIFACT_RAW"] or "").strip().replace(",", "").replace("_", "")
          if not re.fullmatch(r"[0-9]+", artifact) or int(artifact) < 1:
              raise SystemExit("environment_artifact_id must be a positive integer")
          folds = (os.environ["FOLDS_RAW"] or "").strip()
          if not re.fullmatch(r"[0-9]+", folds) or int(folds) < 2 or int(folds) > 20:
              raise SystemExit("n_folds must be an integer from 2 to 20")
          label = (os.environ["LABEL_RAW"] or "").strip()
          if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9._-]{0,79}", label):
              raise SystemExit("output_label is invalid")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"ENVIRONMENT_ARTIFACT_ID={int(artifact)}\n")
              handle.write(f"N_FOLDS={int(folds)}\n")
              handle.write(f"OUTPUT_LABEL={label}\n")
          PY
          python -m py_compile ch1_global/v2/43_run_trait_environment_association_atlas.py
          python -m py_compile ch1_global/v2/44_run_trait_environment_association_atlas_hardened.py

      - name: Download CHELSA-enriched global trait artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p source/environment/extracted
          curl --fail --location --retry 4 --retry-all-errors --retry-delay 2 \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ENVIRONMENT_ARTIFACT_ID}/zip" \
            --output source/environment/environment.zip
          unzip -tq source/environment/environment.zip
          unzip -q source/environment/environment.zip -d source/environment/extracted
          LONG="$(find source/environment/extracted -type f -name global_ai_trait_observation_environment_long.csv | head -n 1)"
          PROVENANCE="$(find source/environment/extracted -type f -name environment_analysis_provenance.json | head -n 1)"
          test -n "$LONG"
          test -n "$PROVENANCE"
          echo "ENVIRONMENT_ROOT=$(dirname "$LONG")" >> "$GITHUB_ENV"

      - name: Run association atlas
        run: |
          python ch1_global/v2/44_run_trait_environment_association_atlas_hardened.py \
            --environment-long "$ENVIRONMENT_ROOT/global_ai_trait_observation_environment_long.csv" \
            --environment-provenance "$ENVIRONMENT_ROOT/environment_analysis_provenance.json" \
            --plan ch1_global/v2/ontology/ch1_trait_environment_association_plan.json \
            --out-dir trait_environment_association_atlas \
            --n-folds "$N_FOLDS" \
            --seed 20260706

      - name: Validate association outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          root = Path("trait_environment_association_atlas")
          feasibility = pd.read_csv(root / "trait_environment_state_feasibility.csv", dtype=str, keep_default_na=False)
          status = pd.read_csv(root / "trait_environment_model_status.csv", dtype=str, keep_default_na=False)
          coefficients = pd.read_csv(root / "trait_environment_model_coefficients.csv", dtype=str, keep_default_na=False)
          validation = pd.read_csv(root / "trait_environment_grouped_validation.csv", dtype=str, keep_default_na=False)
          provenance = json.loads((root / "trait_environment_association_provenance.json").read_text(encoding="utf-8"))
          required_modes = {"all_ensemble_winner", "conservative_strict_consensus"}
          if feasibility.empty or not required_modes.issubset(set(feasibility["measurement_mode"])):
              raise SystemExit("Both model-defined measurement modes must be screened")
          if feasibility.duplicated(["measurement_mode", "trait_id", "trait_state"]).any():
              raise SystemExit("Duplicate trait-state feasibility rows")
          if not set(feasibility["trait_tier"]).issubset({"primary", "secondary", "exploratory", "not_predeclared"}):
              raise SystemExit("Unexpected trait tier")
          if not set(status["model_family"]).issubset({"all", "climate_only", "species_adjusted_within_species"}):
              raise SystemExit("Unexpected model family")
          if not coefficients.empty and not set(coefficients["model_family"]).issubset({"climate_only", "species_adjusted_within_species"}):
              raise SystemExit("Coefficient model family is invalid")
          allowed_schemes = {"spatial_block_10deg", "held_out_species", "spatial_block_10deg_within_species"}
          if not validation.empty and not set(validation["validation_scheme"].dropna()).issubset(allowed_schemes):
              raise SystemExit("Unexpected validation scheme")
          summary = {
              "n_state_outcomes_screened": int(len(feasibility)),
              "n_state_outcomes_eligible": int(feasibility["eligibility_status"].eq("eligible").sum()),
              "n_coefficient_rows": int(len(coefficients)),
              "n_validation_rows": int(len(validation)),
              "n_successful_grouped_validation_rows": int(validation["status"].eq("success").sum()) if not validation.empty else 0,
              "semantic_status": provenance["semantic_status"],
          }
          (root / "association_run_summary.json").write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          PY
          {
            echo "## Trait–environment association atlas"
            echo
            echo '```json'
            cat trait_environment_association_atlas/association_run_summary.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload association atlas artifact
        uses: actions/upload-artifact@v4
        with:
          name: ch1-trait-environment-association-atlas-${{ inputs.output_label }}
          path: trait_environment_association_atlas
          if-no-files-found: error
          retention-days: 90
