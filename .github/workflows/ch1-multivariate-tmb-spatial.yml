name: Ch1 multivariate hierarchical TMB spatial model

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: Run containing ch1-exhaustive-enriched-environment-20260713
        required: true
        default: "29306454759"
      n_spatial_factors:
        description: Number of shared latent spatial factors
        required: true
        default: "3"

permissions:
  actions: read
  contents: read

jobs:
  multivariate-tmb:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudunits2-dev libgdal-dev libgeos-dev libproj-dev
      - name: Install R dependencies
        shell: Rscript {0}
        run: |
          install.packages(c("TMB", "Matrix", "sf"))
          install.packages(
            "INLA",
            repos = c(getOption("repos"), INLA = "https://inla.r-inla-download.org/R/stable"),
            dependencies = c("Depends", "Imports", "LinkingTo")
          )
      - uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.source_run_id }}
          name: ch1-exhaustive-enriched-environment-20260713
          path: enriched_environment
      - name: Fit joint multivariate hierarchical spatial model
        run: |
          Rscript ch1_global/v2/82_run_multivariate_tmb_spatial.R \
            --environment enriched_environment/strict_spatial_thinned_with_climate_topography_soil.csv \
            --out-dir tmb_multivariate_results \
            --n-factors "${{ inputs.n_spatial_factors }}" \
            --min-species-n 5 \
            --mesh-max-edge-km 750 \
            --mesh-cutoff-km 50 \
            --mesh-offset-km 1000
      - uses: actions/upload-artifact@v4
        with:
          name: ch1-multivariate-hierarchical-tmb-spatial
          path: tmb_multivariate_results
          retention-days: 90
