name: Ch1 annotation foundation CI

on:
  push:
    paths:
      - "ch1_global/v2/**"
      - "tests/**"
      - ".github/workflows/ch1-annotation-ci.yml"
  pull_request:
    paths:
      - "ch1_global/v2/**"
      - "tests/**"
      - ".github/workflows/ch1-annotation-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  annotation-foundation:
    name: Annotation foundation checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas requests Pillow

      - name: Compile collection and annotation scripts
        run: |
          python -m py_compile ch1_global/v2/00_build_annotation_manifest.py
          python -m py_compile ch1_global/v2/01_build_blinded_annotation_packets.py
          python -m py_compile ch1_global/v2/02_compile_double_annotations.py
          python -m py_compile ch1_global/v2/03_trait_annotation_app.py
          python -m py_compile ch1_global/v2/04_collect_inat_cirsium_metadata.py
          python -m py_compile ch1_global/v2/05_build_image_screening_queue.py
          python -m py_compile ch1_global/v2/06_download_inat_screening_queue.py
          python -m py_compile ch1_global/v2/07_screen_downloaded_images_with_yolo.py
          python -m py_compile ch1_global/v2/08_summarize_metadata_collection.py
          python -m py_compile ch1_global/v2/09_build_yolo_positive_pool.py
          python -m py_compile ch1_global/v2/10_merge_metadata_chunks.py
          python -m py_compile ch1_global/v2/11_collect_inat_id_chunk.py
          python -m py_compile ch1_global/v2/12_validate_trait_ontology.py
          python -m py_compile ch1_global/v2/13_build_literature_extraction_packets.py
          python -m py_compile ch1_global/v2/14_validate_literature_evidence.py
          python -m py_compile ch1_global/v2/15_compile_literature_trait_summary.py
          python -m py_compile ch1_global/v2/16_build_detector_audit_manifest.py
          python -m py_compile ch1_global/v2/17_evaluate_detector_audit.py
          python -m py_compile ch1_global/v2/18_build_head_context_crops.py
          python -m py_compile ch1_global/v2/19_trait_annotation_app_ontology.py
          python -m py_compile ch1_global/v2/21_build_ontology_blinded_packets.py
          python -m py_compile ch1_global/v2/22_attach_context_crops_to_manifest.py
          python -m py_compile ch1_global/v2/23_validate_detector_model_package.py
          python -m py_compile ch1_global/v2/24_generate_capitulum_bootstrap_proposals.py
          python -m py_compile ch1_global/v2/25_build_bootstrap_yolo_dataset.py
          python -m py_compile ch1_global/v2/26_train_bootstrap_capitulum_detector.py
          python -m py_compile ch1_global/v2/27_build_detector_prediction_triage.py
          python -m py_compile ch1_global/v2/28_build_detected_head_trait_packet.py
          python -m py_compile ch1_global/v2/29_score_detected_head_traits_clip.py
          python -m py_compile ch1_global/v2/30_build_blinded_trait_audit_packet.py
          python -m py_compile ch1_global/v2/31_trait_audit_app.py
          python -m py_compile ch1_global/v2/32_compile_trait_audit_responses.py
          python -m py_compile ch1_global/v2/33_evaluate_trait_audit_against_clip.py

      - name: Run collection and annotation invariants tests
        shell: bash
        run: |
          mkdir -p ci_artifacts
          set +e
          python -m unittest discover -s tests -p "test_*.py" -v 2>&1 | tee ci_artifacts/unittest.log
          test_status=${PIPESTATUS[0]}
          {
            echo "## Unit-test result"
            echo
            echo "Exit status: \`$test_status\`"
            echo
            echo '```text'
            tail -n 160 ci_artifacts/unittest.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$test_status"

      - name: Run reproducible annotation smoke workflow
        run: |
          python ch1_global/v2/00_build_annotation_manifest.py \
            --input tests/fixtures/ch1_crop_metadata_small.csv \
            --out-dir ci_artifacts/ch1_annotation_manifest_smoke \
            --seed 123 \
            --min-heads-per-species 2 \
            --max-heads-per-species 3 \
            --n-main 10 \
            --n-calibration 4 \
            --n-segmentation 3 \
            --n-cv-folds 3
          python ch1_global/v2/01_build_blinded_annotation_packets.py \
            --manifest ci_artifacts/ch1_annotation_manifest_smoke/annotation_manifest.csv \
            --out-dir ci_artifacts/ch1_annotation_packets_smoke \
            --seed 123
          {
            echo "## Ch.1 annotation-foundation smoke run"
            echo
            echo '### Manifest'
            echo '```csv'
            cat ci_artifacts/ch1_annotation_manifest_smoke/annotation_manifest_run_info.csv
            echo '```'
            echo
            echo '### Blinded packets'
            echo '```csv'
            cat ci_artifacts/ch1_annotation_packets_smoke/packet_qc.csv
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke-workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ch1-annotation-foundation-smoke
          path: ci_artifacts
          if-no-files-found: warn
          retention-days: 14
