name: Ch1 submission code CI

on:
  pull_request:
    branches: [main]
    paths:
      - "README.md"
      - "ch1_global/**"
      - "tests/**"
      - ".gitignore"
      - ".github/workflows/ch1-*.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "ch1_global/**"
      - "tests/**"
      - ".gitignore"
      - ".github/workflows/ch1-*.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  submission-code-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ch1_global/v2/requirements-submission.txt

      - name: Install submission dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ch1_global/v2/requirements-submission.txt "PyYAML>=6,<7"
          python -m pip check

      - name: Compile active Python scripts
        run: |
          python - <<'PY'
          from pathlib import Path
          active = []
          for path in sorted(Path("ch1_global/v2").glob("*.py")):
              prefix = path.name.split("_", 1)[0]
              if prefix.isdigit() and 52 <= int(prefix) <= 74:
                  active.append(path)
          if not active:
              raise SystemExit("No active Chapter 1 scripts found")
          for path in active:
              compile(path.read_text(encoding="utf-8"), str(path), "exec")
              print(path)
          PY

      - name: Parse active R submission scripts
        uses: r-lib/actions/setup-r@v2

      - name: Check R syntax and exhaustive shell runner
        run: |
          Rscript -e 'parse(file="ch1_global/v2/65_audit_and_build_historical_trees.R")'
          Rscript -e 'parse(file="ch1_global/v2/66_run_historical_constraint_pgls.R")'
          bash -n ch1_global/v2/72_run_exhaustive_continuous_trait_shard.sh

      - name: Validate JSON and workflow YAML
        run: |
          python -m json.tool ch1_global/v2/submission_config.json >/dev/null
          python - <<'PY'
          from pathlib import Path
          import yaml
          workflows = sorted(Path(".github/workflows").glob("ch1-*.yml"))
          if not workflows:
              raise SystemExit("No Chapter 1 workflows found")
          for path in workflows:
              value = yaml.safe_load(path.read_text(encoding="utf-8"))
              if not isinstance(value, dict) or "jobs" not in value:
                  raise SystemExit(f"Invalid workflow structure: {path}")
              print(path)
          PY

      - name: Enforce production workflow policy
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          production = [
              Path(".github/workflows/ch1-run-continuous-primary-traits.yml"),
              Path(".github/workflows/ch1-qc-join-involucre.yml"),
              Path(".github/workflows/ch1-integrate-continuous-prephylogenetic.yml"),
              Path(".github/workflows/ch1-historical-constraint-sensitivity.yml"),
              Path(".github/workflows/ch1-build-submission-bundle.yml"),
              Path(".github/workflows/ch1-build-exhaustive-photo-queue.yml"),
              Path(".github/workflows/ch1-run-merge-exhaustive-continuous.yml"),
          ]
          stale_artifact_default = re.compile(
              r"^\s*default:\s*[\"']?[0-9]{6,}[\"']?\s*$",
              flags=re.MULTILINE,
          )
          for path in production:
              text = path.read_text(encoding="utf-8")
              if "workflow_dispatch:" not in text:
                  raise SystemExit(f"Production workflow lacks manual dispatch: {path}")
              if "pull_request:" in text or "branches: [feature/" in text:
                  raise SystemExit(f"Research-scale workflow must not run automatically: {path}")
              match = stale_artifact_default.search(text)
              if match:
                  raise SystemExit(
                      f"Stale numeric artifact default in {path}: {match.group(0).strip()}"
                  )
          PY

      - name: Reject stale active references
        run: |
          set -euo pipefail
          forbidden='47_build_representative_trait_holdout|48_evaluate_representative_trait_holdout|49_run_trait_integration_and_constraint|50_build_representative_holdout_inputs|51_build_representative_holdout_packet|REPRESENTATIVE_HOLDOUT_RUNBOOK|v2.*not yet implemented'
          if grep -R -n -E "$forbidden" README.md ch1_global tests .github/workflows \
             --exclude-dir=v1 --exclude='ch1-submission-ci.yml'; then
            echo "Found stale submission-path references"
            exit 1
          fi

      - name: Run unit and invariant tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci_artifacts
          python -m unittest discover -s tests -p "test_*.py" -v 2>&1 \
            | tee ci_artifacts/unittest.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ch1-submission-ci-diagnostics
          path: ci_artifacts
          if-no-files-found: warn
          retention-days: 14
