name: ch1-phase1-lability

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'ch1_global/v2/77_build_lability_axes_and_supplement.py'
      - '.github/workflows/ch1-phase1-lability.yml'

permissions:
  contents: read
  actions: read

jobs:
  analyse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install numpy pandas matplotlib
      - name: Download required analysis artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import tempfile
          import urllib.request
          import zipfile
          from pathlib import Path

          repo = os.environ['GITHUB_REPOSITORY']
          headers = {
              'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
          }
          req = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/actions/artifacts?per_page=100',
              headers=headers,
          )
          artifacts = json.load(urllib.request.urlopen(req))['artifacts']
          artifacts = sorted(
              (a for a in artifacts if not a['expired']),
              key=lambda a: a['created_at'],
              reverse=True,
          )

          destination = Path('upstream_artifacts')
          destination.mkdir(exist_ok=True)
          required = {
              'strict_spatial_thinned_with_chelsa.csv',
              'exhaustive_within_species_climate_models.csv',
          }
          found = set()

          for artifact in artifacts:
              if found == required:
                  break
              with tempfile.NamedTemporaryFile(suffix='.zip') as tmp:
                  endpoint = f"repos/{repo}/actions/artifacts/{artifact['id']}/zip"
                  result = subprocess.run(
                      ['gh', 'api', endpoint],
                      stdout=tmp,
                      stderr=subprocess.PIPE,
                      check=False,
                  )
                  if result.returncode != 0:
                      print(
                          f"Skipping artifact {artifact['name']}: "
                          f"gh api failed: {result.stderr.decode(errors='replace').strip()}"
                      )
                      continue
                  tmp.flush()
                  try:
                      with zipfile.ZipFile(tmp.name) as archive:
                          members = {
                              Path(name).name: name
                              for name in archive.namelist()
                              if Path(name).name in required - found
                          }
                          if not members:
                              continue
                          for basename, member in members.items():
                              target = destination / basename
                              with archive.open(member) as src, target.open('wb') as dst:
                                  dst.write(src.read())
                              found.add(basename)
                              print(
                                  f"Collected {basename} from artifact "
                                  f"{artifact['name']} ({artifact['created_at']})"
                              )
                  except zipfile.BadZipFile:
                      print(f"Skipping artifact {artifact['name']}: invalid ZIP")

          missing = required - found
          if missing:
              raise SystemExit(
                  'Missing required files after scanning non-expired artifacts: '
                  + ', '.join(sorted(missing))
              )
          PY
      - name: Run Phase 1 analysis
        run: |
          OBS=upstream_artifacts/strict_spatial_thinned_with_chelsa.csv
          COEF=upstream_artifacts/exhaustive_within_species_climate_models.csv
          test -s "$OBS" && test -s "$COEF"
          python ch1_global/v2/77_build_lability_axes_and_supplement.py \
            --observations "$OBS" \
            --coefficients "$COEF" \
            --out-dir phase1_results
      - uses: actions/upload-artifact@v4
        with:
          name: ch1-phase1-lability-results
          path: phase1_results/
          if-no-files-found: error
