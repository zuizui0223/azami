name: ch1-phase1-lability

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'ch1_global/v2/77_build_lability_axes_and_supplement.py'
      - '.github/workflows/ch1-phase1-lability.yml'

permissions:
  contents: read
  actions: read

jobs:
  analyse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install numpy pandas matplotlib
      - name: Download newest compatible analysis artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import tempfile
          import urllib.request
          import zipfile
          from pathlib import Path

          repo = os.environ['GITHUB_REPOSITORY']
          headers = {
              'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
          }
          req = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/actions/artifacts?per_page=100',
              headers=headers,
          )
          artifacts = json.load(urllib.request.urlopen(req))['artifacts']
          artifacts = sorted(
              (a for a in artifacts if not a['expired']),
              key=lambda a: a['created_at'],
              reverse=True,
          )

          destination = Path('upstream_artifacts')
          destination.mkdir(exist_ok=True)
          required = {
              'strict_spatial_thinned_with_chelsa.csv',
              'exhaustive_within_species_climate_models.csv',
          }

          for artifact in artifacts:
              with tempfile.NamedTemporaryFile(suffix='.zip') as tmp:
                  endpoint = f"repos/{repo}/actions/artifacts/{artifact['id']}/zip"
                  result = subprocess.run(
                      ['gh', 'api', endpoint],
                      stdout=tmp,
                      stderr=subprocess.PIPE,
                      check=False,
                  )
                  if result.returncode != 0:
                      print(
                          f"Skipping artifact {artifact['name']}: "
                          f"gh api failed: {result.stderr.decode(errors='replace').strip()}"
                      )
                      continue
                  tmp.flush()
                  try:
                      with zipfile.ZipFile(tmp.name) as archive:
                          names = {Path(name).name for name in archive.namelist()}
                          if not required.issubset(names):
                              continue
                          archive.extractall(destination)
                  except zipfile.BadZipFile:
                      print(f"Skipping artifact {artifact['name']}: invalid ZIP")
                      continue

              print('Using artifact:', artifact['name'], artifact['created_at'])
              break
          else:
              raise SystemExit(
                  'No non-expired artifact contains both required CSV files'
              )
          PY
      - name: Run Phase 1 analysis
        run: |
          OBS=$(find upstream_artifacts -name strict_spatial_thinned_with_chelsa.csv -print -quit)
          COEF=$(find upstream_artifacts -name exhaustive_within_species_climate_models.csv -print -quit)
          test -n "$OBS" && test -n "$COEF"
          python ch1_global/v2/77_build_lability_axes_and_supplement.py \
            --observations "$OBS" \
            --coefficients "$COEF" \
            --out-dir phase1_results
      - uses: actions/upload-artifact@v4
        with:
          name: ch1-phase1-lability-results
          path: phase1_results/
          if-no-files-found: error
