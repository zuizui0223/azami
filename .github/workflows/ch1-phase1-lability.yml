name: ch1-phase1-lability

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'ch1_global/v2/77_build_lability_axes_and_supplement.py'
      - '.github/workflows/ch1-phase1-lability.yml'

permissions:
  contents: read
  actions: read

jobs:
  analyse:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SOURCE_RUN_ID: '29216617585'
      SOURCE_ARTIFACT_NAME: ch1-exhaustive-continuous-merged-all_photos_20260711_v1-recovery
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install numpy pandas matplotlib

      - name: Download strict observation cohort
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ env.SOURCE_RUN_ID }}
          name: ${{ env.SOURCE_ARTIFACT_NAME }}
          path: source/final

      - name: Locate strict observation cohort
        run: |
          set -euo pipefail
          mapfile -t matches < <(find source/final -type f -name strict_spatial_thinned_observations.csv | sort)
          test "${#matches[@]}" -eq 1
          echo "OBS=${matches[0]}" >> "$GITHUB_ENV"
          test -s "${matches[0]}"
          wc -l "${matches[0]}"

      - name: Download newest coefficient artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import tempfile
          import urllib.request
          import zipfile
          from pathlib import Path

          repo = os.environ['GITHUB_REPOSITORY']
          headers = {
              'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
          }
          req = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/actions/artifacts?per_page=100',
              headers=headers,
          )
          artifacts = json.load(urllib.request.urlopen(req))['artifacts']
          artifacts = sorted(
              (a for a in artifacts if not a['expired']),
              key=lambda a: a['created_at'],
              reverse=True,
          )

          target_name = 'exhaustive_within_species_climate_models.csv'
          destination = Path('upstream_artifacts')
          destination.mkdir(exist_ok=True)
          target = destination / target_name

          for artifact in artifacts:
              with tempfile.NamedTemporaryFile(suffix='.zip') as tmp:
                  endpoint = f"repos/{repo}/actions/artifacts/{artifact['id']}/zip"
                  result = subprocess.run(
                      ['gh', 'api', endpoint],
                      stdout=tmp,
                      stderr=subprocess.PIPE,
                      check=False,
                  )
                  if result.returncode != 0:
                      continue
                  tmp.flush()
                  try:
                      with zipfile.ZipFile(tmp.name) as archive:
                          matches = [
                              name for name in archive.namelist()
                              if Path(name).name == target_name
                          ]
                          if not matches:
                              continue
                          if len(matches) != 1:
                              raise SystemExit(
                                  f'Artifact {artifact["name"]} contains '
                                  f'{len(matches)} copies of {target_name}'
                              )
                          with archive.open(matches[0]) as src, target.open('wb') as dst:
                              dst.write(src.read())
                  except zipfile.BadZipFile:
                      continue
              print(
                  f'Collected {target_name} from artifact '
                  f'{artifact["name"]} ({artifact["created_at"]})'
              )
              break
          else:
              raise SystemExit(
                  f'No non-expired artifact contains {target_name}'
              )

          if not target.is_file() or target.stat().st_size == 0:
              raise SystemExit(f'Collected coefficient file is empty: {target}')
          PY

      - name: Run Phase 1 analysis
        run: |
          set -euo pipefail
          COEF=upstream_artifacts/exhaustive_within_species_climate_models.csv
          test -s "$OBS" && test -s "$COEF"
          python ch1_global/v2/77_build_lability_axes_and_supplement.py \
            --observations "$OBS" \
            --coefficients "$COEF" \
            --out-dir phase1_results

      - uses: actions/upload-artifact@v4
        with:
          name: ch1-phase1-lability-results
          path: phase1_results/
          if-no-files-found: error
          retention-days: 90
