name: ch1-phase1-lability

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'ch1_global/v2/75_run_exhaustive_within_species_climate_analysis.py'
      - 'ch1_global/v2/77_build_lability_axes_and_supplement.py'
      - '.github/workflows/ch1-phase1-lability.yml'

permissions:
  contents: read
  actions: read

jobs:
  analyse:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SOURCE_RUN_ID: '29216617585'
      SOURCE_ARTIFACT_NAME: ch1-exhaustive-continuous-merged-all_photos_20260711_v1-recovery
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ch1_global/v2/requirements-submission.txt
      - name: Install analysis dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas matplotlib scipy statsmodels rasterio pyproj
          python -m pip check

      - name: Download strict observation cohort
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ env.SOURCE_RUN_ID }}
          name: ${{ env.SOURCE_ARTIFACT_NAME }}
          path: source/final

      - name: Locate strict observation cohort
        run: |
          set -euo pipefail
          mapfile -t matches < <(find source/final -type f -name strict_spatial_thinned_observations.csv | sort)
          test "${#matches[@]}" -eq 1
          echo "STRICT_COHORT=${matches[0]}" >> "$GITHUB_ENV"
          test -s "${matches[0]}"
          wc -l "${matches[0]}"

      - name: Rebuild climate table and global within-species coefficients
        id: climate
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p diagnostics exhaustive_within_species
          python ch1_global/v2/75_run_exhaustive_within_species_climate_analysis.py \
            --observation "$STRICT_COHORT" \
            --out-dir exhaustive_within_species \
            --min-species-model-n 5 \
            --sample-batch-size 1024 \
            2>&1 | tee diagnostics/climate_rebuild.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Upload climate diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ch1-lability-climate-diagnostics
          path: |
            diagnostics/
            exhaustive_within_species/
          if-no-files-found: warn
          retention-days: 14

      - name: Run final species-level lability analysis
        run: |
          set -euo pipefail
          python ch1_global/v2/77_build_lability_axes_and_supplement.py \
            --observations exhaustive_within_species/strict_spatial_thinned_with_chelsa.csv \
            --coefficients exhaustive_within_species/exhaustive_within_species_climate_models.csv \
            --out-dir phase1_results \
            --min-species-n 10 \
            --min-traits 6 \
            --min-predictors 3

      - name: Validate final outputs
        run: |
          set -euo pipefail
          test -s phase1_results/species_lability_axes.csv
          test -s phase1_results/table_s1_all_global_coefficients.csv
          test -s phase1_results/table_s2_species_specific_coefficients.csv
          test -s phase1_results/figure_species_lability_quadrants.png
          test -s phase1_results/figure_s1_effect_size_heatmap.png
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd
          meta=json.loads(Path('phase1_results/analysis_metadata.json').read_text())
          axes=pd.read_csv('phase1_results/species_lability_axes.csv')
          if meta['counts']['input_observations'] != 46276:
              raise SystemExit(f"Unexpected observation count: {meta['counts']['input_observations']}")
          if meta['counts']['input_species'] != 259:
              raise SystemExit(f"Unexpected species count: {meta['counts']['input_species']}")
          if axes['primary_complete'].sum() < 20:
              raise SystemExit('Too few species pass the final completeness rule')
          print(json.dumps(meta, indent=2))
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: ch1-final-lability-results
          path: |
            phase1_results/
            exhaustive_within_species/exhaustive_within_species_climate_report.json
          if-no-files-found: error
          retention-days: 90
