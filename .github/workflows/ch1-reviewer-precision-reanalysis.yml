name: Ch1 reviewer precision reanalysis

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "analysis/reanalyze_lability_precision.py"
      - ".github/workflows/ch1-reviewer-precision-reanalysis.yml"
      - "manuscript/final_claims.json"

permissions:
  actions: read
  contents: read

jobs:
  precision-aware-lability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install pandas numpy scipy matplotlib
      - name: Download frozen lability artifact
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          curl --fail --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/actions/artifacts/8330350031/zip" \
            --output lability.zip
          mkdir -p frozen-lability
          unzip -q lability.zip -d frozen-lability
      - name: Run reviewer-driven correction
        run: |
          python analysis/reanalyze_lability_precision.py \
            --legacy-axes frozen-lability/phase1_results/species_lability_axes.csv \
            --variation frozen-lability/phase1_results/species_trait_within_variation.csv \
            --slopes frozen-lability/phase1_results/table_s2_species_specific_coefficients.csv \
            --out-dir reviewer-precision-results \
            --bootstrap-repeats 5000 \
            --seed 20260722
      - uses: actions/upload-artifact@v4
        with:
          name: ch1-reviewer-precision-reanalysis
          path: reviewer-precision-results
          retention-days: 90
