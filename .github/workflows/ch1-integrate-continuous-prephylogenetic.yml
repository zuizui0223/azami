name: Ch1 integrate continuous traits before phylogeny

on:
  workflow_dispatch:
    inputs:
      next_stage_artifact_id:
        description: Frozen QC/environment/involucre artifact ID
        required: true
        type: string
      output_label:
        description: Safe output label
        required: true
        default: submission_candidate
        type: string

permissions:
  actions: read
  contents: read

jobs:
  integrate-and-screen:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_STAGE_ARTIFACT_ID: ${{ inputs.next_stage_artifact_id }}
      OUTPUT_LABEL: ${{ inputs.output_label }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ch1_global/v2/requirements-submission.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ch1_global/v2/requirements-submission.txt
          python -m pip check

      - name: Validate request
        run: |
          python - <<'PY'
          import os, re
          artifact = os.environ["NEXT_STAGE_ARTIFACT_ID"].strip().replace(",", "").replace("_", "")
          label = os.environ["OUTPUT_LABEL"].strip()
          if not re.fullmatch(r"[0-9]+", artifact) or int(artifact) < 1:
              raise SystemExit("next_stage_artifact_id must be a positive integer")
          if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9._-]{0,79}", label):
              raise SystemExit("output_label is invalid")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"NEXT_STAGE_ARTIFACT_ID={int(artifact)}\n")
              handle.write(f"OUTPUT_LABEL={label}\n")
          PY

      - name: Download frozen next-stage artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p source
          curl --fail --location --retry 4 --retry-all-errors --retry-delay 2 \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${NEXT_STAGE_ARTIFACT_ID}/zip" \
            --output source/next_stage.zip
          unzip -tq source/next_stage.zip
          sha256sum source/next_stage.zip | tee source/input_artifact_sha256.txt
          unzip -q source/next_stage.zip -d source/extracted

      - name: Resolve unambiguous inputs
        run: |
          set -euo pipefail
          resolve_one() {
            local pattern="$1" variable="$2"
            mapfile -t values < <(find source/extracted -type f -name "$pattern" | sort)
            if [ "${#values[@]}" -ne 1 ]; then
              printf 'Expected exactly one %s, found %s\n' "$pattern" "${#values[@]}" >&2
              printf '%s\n' "${values[@]}" >&2
              exit 1
            fi
            echo "${variable}=${values[0]}" >> "$GITHUB_ENV"
          }
          resolve_one primary_continuous_observation_environment.csv PRIMARY_OBSERVATION
          resolve_one primary_continuous_species_environment.csv PRIMARY_SPECIES
          resolve_one involucre_auxiliary_observation_level.csv AUXILIARY_OBSERVATION
          resolve_one involucre_auxiliary_species_level.csv AUXILIARY_SPECIES

      - name: Join primary and auxiliary tables
        run: |
          python ch1_global/v2/62_join_primary_auxiliary_continuous.py \
            --primary-observation "$PRIMARY_OBSERVATION" \
            --primary-species "$PRIMARY_SPECIES" \
            --auxiliary-observation "$AUXILIARY_OBSERVATION" \
            --auxiliary-species "$AUXILIARY_SPECIES" \
            --out-dir integrated

      - name: Run staged prephylogenetic models
        run: |
          python ch1_global/v2/63_run_prephylogenetic_continuous_environment_models.py \
            --observation integrated/integrated_primary_auxiliary_observation.csv \
            --species integrated/integrated_primary_auxiliary_species.csv \
            --registry integrated/integrated_continuous_endpoint_registry.csv \
            --out-dir prephylogenetic_models \
            --min-observations 100 \
            --min-species 30

      - name: Build staged effect figures
        run: |
          python ch1_global/v2/64_build_prephylogenetic_effect_figures.py \
            --coefficients prephylogenetic_models/continuous_environment_model_coefficients.csv \
            --out-dir prephylogenetic_figures

      - name: Validate integrated outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          joined = json.loads(Path("integrated/integrated_continuous_join_report.json").read_text())
          model = json.loads(Path("prephylogenetic_models/continuous_environment_model_report.json").read_text())
          coefficients = pd.read_csv("prephylogenetic_models/continuous_environment_model_coefficients.csv")
          statuses = pd.read_csv("prephylogenetic_models/continuous_environment_model_status.csv")
          if joined["n_observations"] != 3725 or joined["n_species"] != 216:
              raise SystemExit("Integrated dimensions are incorrect")
          if joined["n_observations_with_auxiliary"] != 1292 or joined["n_species_with_auxiliary"] != 210:
              raise SystemExit("Auxiliary coverage changed unexpectedly")
          if model["n_successful_models"] != 36 or model["n_failed_models"] != 0:
              raise SystemExit("Not all staged models succeeded")
          if len(coefficients) != 144 or len(statuses) != 36:
              raise SystemExit("Unexpected coefficient/status dimensions")
          between = coefficients.loc[coefficients["model_scale"].eq("species_between")]
          if not between["historical_constraint"].eq("not_yet_applied_PGLS_required").all():
              raise SystemExit("Between-species results are not labelled as pre-PGLS")
          forbidden_columns = {
              "selection_stratum", "ai_candidate_state",
              "observation_ai_all_state", "observation_ai_conservative_state",
          }
          for path in (
              "integrated/integrated_primary_auxiliary_observation.csv",
              "integrated/integrated_primary_auxiliary_species.csv",
          ):
              columns = set(pd.read_csv(path, nrows=0).columns)
              leaked = forbidden_columns.intersection(columns)
              if leaked:
                  raise SystemExit(f"Legacy fields leaked into {path}: {sorted(leaked)}")
          pngs = list(Path("prephylogenetic_figures").glob("*.png"))
          if len(pngs) != 5 or any(path.stat().st_size < 1000 for path in pngs):
              raise SystemExit("Expected five nonempty effect figures")
          print({"joined": joined, "model": model, "figures": [path.name for path in pngs]})
          PY

      - name: Record provenance
        run: |
          cp source/input_artifact_sha256.txt integrated/input_artifact_sha256.txt
          printf '%s\n' "$GITHUB_SHA" > integrated/git_sha.txt
          python -m pip freeze > integrated/python_environment.txt

      - name: Upload integrated prephylogenetic bundle
        uses: actions/upload-artifact@v4
        with:
          name: ch1-integrated-continuous-${{ env.OUTPUT_LABEL }}
          path: |
            integrated
            prephylogenetic_models
            prephylogenetic_figures
          if-no-files-found: error
          retention-days: 90
