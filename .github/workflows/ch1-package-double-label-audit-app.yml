name: Ch1 package double-label trait audit app

on:
  workflow_dispatch:
    inputs:
      public_audit_app_artifact_id:
        description: "Public 250-task focused trait-audit app artifact ID"
        required: true
        default: "8083340131"
        type: string
      private_audit_key_artifact_id:
        description: "Private trait-audit selection-key artifact ID"
        required: true
        default: "8077453937"
        type: string
      output_label:
        description: "Safe artifact label"
        required: true
        default: "global_double_label_trait_audit_app_v1"
        type: string

permissions:
  actions: read
  contents: read

jobs:
  package-double-label-trait-audit-app:
    name: Package blinded second-annotator trait-audit subset
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install subset-build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas

      - name: Validate subset package request
        env:
          PUBLIC_ARTIFACT_RAW: ${{ inputs.public_audit_app_artifact_id }}
          PRIVATE_ARTIFACT_RAW: ${{ inputs.private_audit_key_artifact_id }}
          OUTPUT_LABEL_RAW: ${{ inputs.output_label }}
        run: |
          python - <<'PY'
          import os
          import re

          def artifact_id(raw, field):
              value = (raw or "").strip().replace(",", "").replace("_", "")
              if not re.fullmatch(r"[0-9]+", value) or int(value) < 1:
                  raise SystemExit(f"{field} must be a positive integer")
              return int(value)

          public_id = artifact_id(os.environ["PUBLIC_ARTIFACT_RAW"], "public_audit_app_artifact_id")
          private_id = artifact_id(os.environ["PRIVATE_ARTIFACT_RAW"], "private_audit_key_artifact_id")
          label = (os.environ["OUTPUT_LABEL_RAW"] or "").strip()
          if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9._-]{0,79}", label):
              raise SystemExit("output_label may contain only letters, digits, dot, underscore, and hyphen.")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"PUBLIC_AUDIT_APP_ARTIFACT_ID={public_id}\n")
              handle.write(f"PRIVATE_AUDIT_KEY_ARTIFACT_ID={private_id}\n")
              handle.write(f"OUTPUT_LABEL={label}\n")
          PY

      - name: Download public audit app and private selection key
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p source/public source/private
          for specification in "${PUBLIC_AUDIT_APP_ARTIFACT_ID}:source/public/app_bundle.zip:source/public/extracted" "${PRIVATE_AUDIT_KEY_ARTIFACT_ID}:source/private/private_key.zip:source/private/extracted"; do
            IFS=':' read -r artifact_id zip_path extract_dir <<< "$specification"
            curl --fail --location --retry 4 --retry-all-errors --retry-delay 2 \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" \
              --output "$zip_path"
            unzip -tq "$zip_path"
            mkdir -p "$extract_dir"
            unzip -q "$zip_path" -d "$extract_dir"
          done
          test -s source/public/extracted/blinded_trait_audit_tasks.csv
          test -s source/private/extracted/private_audit_key/trait_audit_selection_key.csv

      - name: Build public-only double-label subset
        run: |
          python ch1_global/v2/34_build_blinded_double_label_subset.py \
            --public-packet-root source/public/extracted \
            --private-audit-key source/private/extracted/private_audit_key/trait_audit_selection_key.csv \
            --out-dir subset_build \
            --batch-name "$OUTPUT_LABEL"

      - name: Add focused audit app and second-annotator launchers
        run: |
          set -euo pipefail
          APP_ROOT=subset_build/blinded_second_annotator_packet
          cp source/public/extracted/trait_audit_app.py "$APP_ROOT/trait_audit_app.py"
          cp source/public/extracted/ch1_trait_ontology.csv "$APP_ROOT/ch1_trait_ontology.csv"
          cp source/public/extracted/requirements.txt "$APP_ROOT/requirements.txt"
          cat > "$APP_ROOT/run_second_audit_windows.bat" <<'BAT'
          @echo off
          setlocal
          set /p ANNOTATOR=Independent annotator ID (must differ from primary): 
          if "%ANNOTATOR%"=="" (
            echo Annotator ID is required.
            exit /b 1
          )
          py -m pip install -r requirements.txt
          py -m streamlit run trait_audit_app.py -- --tasks blinded_trait_audit_tasks.csv --out-dir responses\%ANNOTATOR% --ontology ch1_trait_ontology.csv --annotator %ANNOTATOR%
          BAT
          cat > "$APP_ROOT/run_second_audit_macos_linux.sh" <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          read -r -p "Independent annotator ID (must differ from primary): " ANNOTATOR
          if [[ -z "${ANNOTATOR}" ]]; then
            echo "Annotator ID is required." >&2
            exit 1
          fi
          python3 -m pip install -r requirements.txt
          python3 -m streamlit run trait_audit_app.py -- --tasks blinded_trait_audit_tasks.csv --out-dir "responses/${ANNOTATOR}" --ontology ch1_trait_ontology.csv --annotator "${ANNOTATOR}"
          SH
          chmod +x "$APP_ROOT/run_second_audit_macos_linux.sh"

      - name: Validate public-only second-annotator subset
        run: |
          python - <<'PY'
          import csv
          import json
          from pathlib import Path

          root = Path("subset_build/blinded_second_annotator_packet")
          with (root / "blinded_trait_audit_tasks.csv").open(encoding="utf-8-sig", newline="") as handle:
              reader = csv.DictReader(handle)
              rows = list(reader)
              fields = set(reader.fieldnames or [])
          expected = {"task_id", "annotation_unit_id", "trait_id", "source_image", "crop_path", "context_crop_path"}
          if fields != expected:
              raise SystemExit(f"Unexpected public subset columns: {sorted(fields)}")
          forbidden = {"ai_candidate_state", "runner_up_state", "similarity_margin", "selection_stratum", "double_label"}
          if forbidden.intersection(fields):
              raise SystemExit("Public subset leaks private fields")
          if not rows:
              raise SystemExit("Second-annotator subset has no tasks")
          for row in rows:
              for field in ("source_image", "crop_path", "context_crop_path"):
                  if not (root / row[field]).is_file():
                      raise SystemExit(f"Missing subset image {field}: {row[field]}")
          report = json.loads(Path("subset_build/blinded_second_annotator_subset_report.json").read_text(encoding="utf-8"))
          if report["n_tasks"] != len(rows):
              raise SystemExit("Subset report and task count disagree")
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY
          {
            echo "## Blinded second-annotator subset"
            echo
            echo '```json'
            cat subset_build/blinded_second_annotator_subset_report.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload blinded second-annotator app bundle
        uses: actions/upload-artifact@v4
        with:
          name: ch1-double-label-trait-audit-app-${{ inputs.output_label }}
          path: subset_build/blinded_second_annotator_packet
          if-no-files-found: error
          retention-days: 90
