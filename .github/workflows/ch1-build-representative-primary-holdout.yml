name: Ch1 build simple representative trait holdout

on:
  workflow_dispatch:
    inputs:
      global_ai_analysis_artifact_id:
        description: Merged 216-species global AI analysis artifact ID
        required: true
        default: "8099953404"
        type: string
      output_label:
        description: Safe output label
        required: true
        default: primary_traits_simple_v1
        type: string
  pull_request:
    branches: [main]
    paths:
      - ch1_global/v2/51_build_representative_holdout_packet.py
      - ch1_global/v2/48_evaluate_representative_trait_holdout.py
      - ch1_global/v2/REPRESENTATIVE_HOLDOUT_RUNBOOK.md
      - tests/test_ch1_representative_primary_packet.py
      - .github/workflows/ch1-build-representative-primary-holdout.yml
  push:
    branches: [main, simplify/ch1-representative-holdout]
    paths:
      - ch1_global/v2/51_build_representative_holdout_packet.py
      - ch1_global/v2/48_evaluate_representative_trait_holdout.py
      - ch1_global/v2/REPRESENTATIVE_HOLDOUT_RUNBOOK.md
      - tests/test_ch1_representative_primary_packet.py
      - .github/workflows/ch1-build-representative-primary-holdout.yml

permissions:
  actions: read
  contents: read

jobs:
  build-simple-holdout:
    name: Build 360-task primary and 90-task secondary packets
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GLOBAL_AI_ARTIFACT_ID: ${{ inputs.global_ai_analysis_artifact_id || '8099953404' }}
      OUTPUT_LABEL: ${{ inputs.output_label || 'primary_traits_simple_v1' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas Pillow requests

      - name: Validate request
        run: |
          python - <<'PY'
          import os, re
          artifact = os.environ["GLOBAL_AI_ARTIFACT_ID"].strip().replace(",", "").replace("_", "")
          if not re.fullmatch(r"[0-9]+", artifact) or int(artifact) < 1:
              raise SystemExit("global_ai_analysis_artifact_id must be positive")
          if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9._-]{0,79}", os.environ["OUTPUT_LABEL"]):
              raise SystemExit("output_label is invalid")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"GLOBAL_AI_ARTIFACT_ID={int(artifact)}\n")
          PY

      - name: Download merged global AI artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p source/global
          curl --fail --location --retry 4 --retry-all-errors --retry-delay 2 \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${GLOBAL_AI_ARTIFACT_ID}/zip" \
            --output source/global/global_ai.zip
          unzip -tq source/global/global_ai.zip
          unzip -q source/global/global_ai.zip -d source/global/extracted
          test -s source/global/extracted/global_ai_analysis_units/ai_trait_head_level_with_metadata.csv
          test -s source/global/extracted/merged_shards/global_ai_merged_yolo_crop_metadata.csv

      - name: Build simple representative packets
        run: |
          python ch1_global/v2/51_build_representative_holdout_packet.py \
            --head-traits source/global/extracted/global_ai_analysis_units/ai_trait_head_level_with_metadata.csv \
            --yolo-crops source/global/extracted/merged_shards/global_ai_merged_yolo_crop_metadata.csv \
            --ontology ch1_global/v2/ontology/ch1_trait_ontology.csv \
            --out-dir representative_holdout \
            --traits capitulum_orientation corolla_colour_class capitulum_shape \
            --measurement-mode conservative \
            --n-tasks-per-trait 120 \
            --double-label-fraction 0.25 \
            --context-pad-ratio 1.5 \
            --seed 20260710 --sleep-sec 0.15 --timeout-sec 60 --retries 4

      - name: Validate the simple design
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          root = Path("representative_holdout")
          primary_root = root / "representative_trait_holdout_primary"
          secondary_root = root / "representative_trait_holdout_secondary"
          primary = pd.read_csv(primary_root / "blinded_trait_audit_tasks.csv", dtype=str, keep_default_na=False)
          secondary = pd.read_csv(secondary_root / "blinded_trait_audit_tasks.csv", dtype=str, keep_default_na=False)
          key = pd.read_csv(root / "representative_trait_holdout_key" / "representative_trait_holdout_key.csv", dtype=str, keep_default_na=False)
          report = json.loads((root / "representative_trait_holdout_report.json").read_text(encoding="utf-8"))

          forbidden = {"taxon_name", "ai_candidate_state", "double_label", "obs_id", "photo_id"}
          if forbidden & set(primary.columns) or forbidden & set(secondary.columns):
              raise SystemExit("Public packet leaks private fields")
          if (len(primary), len(secondary), len(key)) != (360, 90, 360):
              raise SystemExit({"primary": len(primary), "secondary": len(secondary), "key": len(key)})
          if report["n_primary_tasks"] != 360 or report["n_secondary_tasks"] != 90:
              raise SystemExit("Report task counts are incorrect")
          if primary["task_id"].duplicated().any() or key["task_id"].duplicated().any():
              raise SystemExit("Duplicate task IDs")
          if not set(secondary["task_id"]).issubset(set(primary["task_id"])):
              raise SystemExit("Secondary packet is not a primary subset")
          if "selection_stratum" in key.columns:
              raise SystemExit("The simple key must not contain annotation strata")

          for trait in ("capitulum_orientation", "corolla_colour_class", "capitulum_shape"):
              if primary["trait_id"].eq(trait).sum() != 120:
                  raise SystemExit(f"Primary count is incorrect for {trait}")
              if secondary["trait_id"].eq(trait).sum() != 30:
                  raise SystemExit(f"Secondary count is incorrect for {trait}")

          for packet_root, table in ((primary_root, primary), (secondary_root, secondary)):
              for field in ("source_image", "crop_path", "context_crop_path"):
                  missing = [value for value in table[field] if not (packet_root / value).is_file()]
                  if missing:
                      raise SystemExit(f"Missing {field}: {missing[:5]}")
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Package direct-upload ZIP files
        run: |
          set -euo pipefail
          (cd representative_holdout/representative_trait_holdout_primary && zip -qr ../representative_primary_360.zip .)
          (cd representative_holdout/representative_trait_holdout_secondary && zip -qr ../representative_secondary_90.zip .)
          python - <<'PY'
          from pathlib import Path
          root = Path("representative_holdout")
          for name in ("representative_primary_360.zip", "representative_secondary_90.zip"):
              size = (root / name).stat().st_size / 1024 / 1024
              print(f"{name}: {size:.2f} MiB")
              if size > 195:
                  raise SystemExit(f"{name} exceeds Streamlit's upload limit")
          PY

      - name: Report summary
        run: |
          {
            echo "## Simple representative holdout"
            echo '```json'
            cat representative_holdout/representative_trait_holdout_report.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload primary 360-task packet
        uses: actions/upload-artifact@v4
        with:
          name: ch1-representative-primary-360-${{ env.OUTPUT_LABEL }}
          path: representative_holdout/representative_primary_360.zip
          if-no-files-found: error
          retention-days: 90

      - name: Upload secondary 90-task packet
        uses: actions/upload-artifact@v4
        with:
          name: ch1-representative-secondary-90-${{ env.OUTPUT_LABEL }}
          path: representative_holdout/representative_secondary_90.zip
          if-no-files-found: error
          retention-days: 90

      - name: Upload private key
        uses: actions/upload-artifact@v4
        with:
          name: ch1-representative-private-key-${{ env.OUTPUT_LABEL }}
          path: |
            representative_holdout/representative_trait_holdout_key
            representative_holdout/representative_trait_holdout_report.json
            representative_holdout/representative_holdout_image_build_status.csv
          if-no-files-found: error
          retention-days: 90
