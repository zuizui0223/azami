name: Ch1 build representative primary-trait holdout

on:
  workflow_dispatch:
    inputs:
      global_ai_analysis_artifact_id:
        description: "Merged 216-species global AI analysis artifact ID"
        required: true
        default: "8099953404"
        type: string
      n_tasks_per_trait:
        description: "Representative tasks per primary trait"
        required: true
        default: "120"
        type: string
      double_label_fraction:
        description: "Fraction included in the secondary annotator packet"
        required: true
        default: "0.25"
        type: string
      output_label:
        description: "Safe output label"
        required: true
        default: "primary_traits_120_per_trait_v1"
        type: string
  push:
    branches:
      - build/ch1-representative-holdout
    paths:
      - "ch1_global/v2/51_build_representative_holdout_packet.py"
      - ".github/workflows/ch1-build-representative-primary-holdout.yml"

permissions:
  actions: read
  contents: read

jobs:
  build-representative-holdout:
    name: Build representative blinded holdout packets
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GLOBAL_AI_ARTIFACT_ID: ${{ inputs.global_ai_analysis_artifact_id || '8099953404' }}
      N_TASKS_PER_TRAIT: ${{ inputs.n_tasks_per_trait || '120' }}
      DOUBLE_LABEL_FRACTION: ${{ inputs.double_label_fraction || '0.25' }}
      OUTPUT_LABEL: ${{ inputs.output_label || 'primary_traits_120_per_trait_v1' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install holdout dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas Pillow requests

      - name: Validate request
        run: |
          python - <<'PY'
          import os
          import re
          artifact = os.environ["GLOBAL_AI_ARTIFACT_ID"].strip().replace(",", "").replace("_", "")
          if not re.fullmatch(r"[0-9]+", artifact) or int(artifact) < 1:
              raise SystemExit("global_ai_analysis_artifact_id must be a positive integer")
          try:
              n_tasks = int(os.environ["N_TASKS_PER_TRAIT"])
              fraction = float(os.environ["DOUBLE_LABEL_FRACTION"])
          except ValueError as error:
              raise SystemExit("n_tasks_per_trait and double_label_fraction must be numeric") from error
          if n_tasks < 50:
              raise SystemExit("n_tasks_per_trait must be at least 50 for the certification gate")
          if not 0 < fraction <= 1:
              raise SystemExit("double_label_fraction must be in (0,1]")
          label = os.environ["OUTPUT_LABEL"].strip()
          if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9._-]{0,79}", label):
              raise SystemExit("output_label is invalid")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"GLOBAL_AI_ARTIFACT_ID={int(artifact)}\n")
              handle.write(f"N_TASKS_PER_TRAIT={n_tasks}\n")
              handle.write(f"DOUBLE_LABEL_FRACTION={fraction}\n")
          PY

      - name: Download merged global AI analysis artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p source/global
          curl --fail --location --retry 4 --retry-all-errors --retry-delay 2 \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${GLOBAL_AI_ARTIFACT_ID}/zip" \
            --output source/global/global_ai.zip
          unzip -tq source/global/global_ai.zip
          unzip -q source/global/global_ai.zip -d source/global/extracted
          test -s source/global/extracted/global_ai_analysis_units/ai_trait_head_level_with_metadata.csv
          test -s source/global/extracted/merged_shards/global_ai_merged_yolo_crop_metadata.csv

      - name: Build representative public and private packets
        run: |
          python ch1_global/v2/51_build_representative_holdout_packet.py \
            --head-traits source/global/extracted/global_ai_analysis_units/ai_trait_head_level_with_metadata.csv \
            --yolo-crops source/global/extracted/merged_shards/global_ai_merged_yolo_crop_metadata.csv \
            --ontology ch1_global/v2/ontology/ch1_trait_ontology.csv \
            --out-dir representative_holdout \
            --traits capitulum_orientation corolla_colour_class capitulum_shape \
            --measurement-mode conservative \
            --n-tasks-per-trait "$N_TASKS_PER_TRAIT" \
            --double-label-fraction "$DOUBLE_LABEL_FRACTION" \
            --context-pad-ratio 1.5 \
            --seed 20260710 \
            --sleep-sec 0.15 \
            --timeout-sec 60 \
            --retries 4

      - name: Validate blinding, coverage, and image integrity
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          root = Path("representative_holdout")
          primary_root = root / "representative_trait_holdout_primary"
          secondary_root = root / "representative_trait_holdout_secondary"
          key_root = root / "representative_trait_holdout_key"
          primary = pd.read_csv(primary_root / "blinded_trait_audit_tasks.csv", dtype=str, keep_default_na=False)
          secondary = pd.read_csv(secondary_root / "blinded_trait_audit_tasks.csv", dtype=str, keep_default_na=False)
          key = pd.read_csv(key_root / "representative_trait_holdout_key.csv", dtype=str, keep_default_na=False)
          report = json.loads((root / "representative_trait_holdout_report.json").read_text(encoding="utf-8"))

          forbidden = {"taxon_name", "ai_candidate_state", "selection_stratum", "double_label", "obs_id", "photo_id"}
          if forbidden.intersection(primary.columns) or forbidden.intersection(secondary.columns):
              raise SystemExit("A public packet leaks private fields")
          expected_primary = int(os.environ["N_TASKS_PER_TRAIT"]) * 3
          expected_secondary = round(expected_primary * float(os.environ["DOUBLE_LABEL_FRACTION"]))
          if len(primary) != expected_primary or len(secondary) != expected_secondary or len(key) != expected_primary:
              raise SystemExit({"primary": len(primary), "secondary": len(secondary), "key": len(key)})
          if primary["task_id"].duplicated().any() or key["task_id"].duplicated().any():
              raise SystemExit("Task IDs are not unique")
          if not set(secondary["task_id"]).issubset(set(primary["task_id"])):
              raise SystemExit("Secondary packet is not a subset of primary")
          for packet_root, table in ((primary_root, primary), (secondary_root, secondary)):
              for field in ("source_image", "crop_path", "context_crop_path"):
                  missing = [value for value in table[field] if not (packet_root / value).is_file()]
                  if missing:
                      raise SystemExit(f"Missing {field}: {missing[:5]}")
          for trait in ("capitulum_orientation", "corolla_colour_class", "capitulum_shape"):
              if primary["trait_id"].eq(trait).sum() != int(os.environ["N_TASKS_PER_TRAIT"]):
                  raise SystemExit(f"Unexpected task count for {trait}")
              if report["per_trait"][trait]["n_public_taxa"] < 10:
                  raise SystemExit(f"Too few taxa represented for {trait}")
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Package direct-upload ZIP files
        run: |
          set -euo pipefail
          cd representative_holdout/representative_trait_holdout_primary
          zip -qr ../representative_primary_public.zip .
          cd ../representative_trait_holdout_secondary
          zip -qr ../representative_secondary_public.zip .
          cd ..
          python - <<'PY'
          from pathlib import Path
          for name in ("representative_primary_public.zip", "representative_secondary_public.zip"):
              path = Path(name)
              size_mb = path.stat().st_size / 1024 / 1024
              print(f"{name}: {size_mb:.2f} MiB")
              if size_mb > 195:
                  raise SystemExit(f"{name} exceeds the Streamlit 200 MB upload limit")
          PY

      - name: Add report to job summary
        run: |
          {
            echo "## Representative primary-trait holdout"
            echo
            echo '```json'
            cat representative_holdout/representative_trait_holdout_report.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload primary annotator public packet
        uses: actions/upload-artifact@v4
        with:
          name: ch1-representative-primary-public-${{ env.OUTPUT_LABEL }}
          path: representative_holdout/representative_primary_public.zip
          if-no-files-found: error
          retention-days: 90

      - name: Upload secondary annotator public packet
        uses: actions/upload-artifact@v4
        with:
          name: ch1-representative-secondary-public-${{ env.OUTPUT_LABEL }}
          path: representative_holdout/representative_secondary_public.zip
          if-no-files-found: error
          retention-days: 90

      - name: Upload private holdout key and provenance
        uses: actions/upload-artifact@v4
        with:
          name: ch1-representative-private-key-${{ env.OUTPUT_LABEL }}
          path: |
            representative_holdout/representative_trait_holdout_key
            representative_holdout/representative_trait_holdout_report.json
            representative_holdout/representative_holdout_image_build_status.csv
          if-no-files-found: error
          retention-days: 90
