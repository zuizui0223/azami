name: Ch1 finalize detector-audit image QC

on:
  workflow_dispatch:
    inputs:
      downloaded_images_artifact_id:
        description: "Existing downloaded detector-audit image artifact ID"
        required: true
        default: "8067732475"
        type: string
      output_label:
        description: "Safe label for finalized QC artifact"
        required: true
        default: "global_1000_medium_v1_qc"
        type: string

permissions:
  actions: read
  contents: read

jobs:
  finalize-detector-audit-qc:
    name: Finalize downloaded detector-audit image QC
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install QC dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas Pillow

      - name: Validate request
        env:
          SOURCE_ARTIFACT_RAW: ${{ inputs.downloaded_images_artifact_id }}
          OUTPUT_LABEL_RAW: ${{ inputs.output_label }}
        run: |
          python - <<'PY'
          import os
          import re
          artifact_id = (os.environ["SOURCE_ARTIFACT_RAW"] or "").strip().replace(",", "").replace("_", "")
          label = (os.environ["OUTPUT_LABEL_RAW"] or "").strip()
          if not re.fullmatch(r"[0-9]+", artifact_id) or int(artifact_id) < 1:
              raise SystemExit("downloaded_images_artifact_id must be a positive integer.")
          if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9._-]{0,79}", label):
              raise SystemExit("output_label may contain only letters, digits, dot, underscore, and hyphen.")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"SOURCE_ARTIFACT_ID={artifact_id}\n")
              handle.write(f"OUTPUT_LABEL={label}\n")
          PY

      - name: Download existing image artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p source_artifact
          curl --fail --location --retry 4 --retry-all-errors --retry-delay 2 \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${SOURCE_ARTIFACT_ID}/zip" \
            --output source_artifact/downloaded_images.zip
          unzip -tq source_artifact/downloaded_images.zip
          unzip -q source_artifact/downloaded_images.zip -d source_artifact/extracted
          test -s source_artifact/extracted/downloaded_audit/download_results.csv
          test -d source_artifact/extracted/downloaded_audit/images

      - name: Revalidate image decodability and write formal QC report
        env:
          SOURCE_ARTIFACT_ID: ${{ env.SOURCE_ARTIFACT_ID }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          import pandas as pd
          from PIL import Image

          root = Path("source_artifact/extracted/downloaded_audit")
          results = pd.read_csv(root / "download_results.csv", dtype=str, keep_default_na=False)
          success = results.loc[results["download_status"].eq("success")].copy()
          decoded, failures = [], []
          for _, row in success.iterrows():
              path = Path(row["image_local_path"])
              if not path.exists():
                  # Artifact paths retain their original absolute runner prefix.
                  path = root / "images" / Path(row["image_local_path"]).name
              try:
                  with Image.open(path) as image:
                      image.verify()
                  with Image.open(path) as image:
                      width, height = image.size
                  decoded.append({"queue_id": row["queue_id"], "photo_id": row["photo_id"], "image_file": path.name, "width": width, "height": height})
              except Exception as error:
                  failures.append({"queue_id": row["queue_id"], "photo_id": row["photo_id"], "image_file": path.name, "reason": str(error)})
          pd.DataFrame(decoded).to_csv(root / "image_decode_qc_final.csv", index=False, encoding="utf-8-sig")
          pd.DataFrame(failures, columns=["queue_id", "photo_id", "image_file", "reason"]).to_csv(root / "image_decode_failures_final.csv", index=False, encoding="utf-8-sig")
          report = {
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "source_downloaded_images_artifact_id": int(os.environ["SOURCE_ARTIFACT_ID"]),
              "n_queue_rows": int(len(results)),
              "n_download_success": int(results["download_status"].eq("success").sum()),
              "n_download_non_success": int((~results["download_status"].eq("success")).sum()),
              "n_decodable_images": int(len(decoded)),
              "n_decode_failures": int(len(failures)),
              "status": "pass" if len(decoded) and not failures and results["download_status"].eq("success").all() else "review_required",
              "note": "This is a post-download QC finalization. No detector predictions were generated or used.",
          }
          (root / "download_qc_report_final.json").write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding="utf-8")
          if report["status"] != "pass":
              raise SystemExit(json.dumps(report, ensure_ascii=False))
          PY
          {
            echo "## Final detector-audit image QC"
            echo
            echo '```json'
            cat source_artifact/extracted/downloaded_audit/download_qc_report_final.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload finalized image QC artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ch1-detector-audit-images-qc-${{ inputs.output_label }}
          path: |
            source_artifact/extracted/downloaded_audit/download_results.csv
            source_artifact/extracted/downloaded_audit/download_manifest.json
            source_artifact/extracted/downloaded_audit/image_decode_qc_final.csv
            source_artifact/extracted/downloaded_audit/image_decode_failures_final.csv
            source_artifact/extracted/downloaded_audit/download_qc_report_final.json
            source_artifact/extracted/downloaded_audit/images
            source_artifact/extracted/audit_queue_source/extracted/detector_audit_queue.csv
            source_artifact/extracted/audit_queue_source/extracted/detector_audit_blinded_manifest.csv
            source_artifact/extracted/audit_queue_source/extracted/detector_audit_assignments.csv
            source_artifact/extracted/audit_queue_source/extracted/detector_audit_annotation_template.csv
            source_artifact/extracted/audit_queue_source/extracted/detector_audit_manifest_report.json
          if-no-files-found: warn
          retention-days: 90
