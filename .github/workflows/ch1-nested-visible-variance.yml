name: Ch1 nested visible variance

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "analysis/decompose_nested_visible_variance.py"
      - ".github/workflows/ch1-nested-visible-variance.yml"
      - "manuscript/final_claims.json"

permissions:
  actions: read
  contents: read

jobs:
  decompose-visible-variance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install pandas numpy matplotlib
      - name: Download frozen continuous-trait artifact
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          curl --fail --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/actions/artifacts/8225059018/zip" \
            --output continuous.zip
          mkdir -p frozen-continuous
          unzip -q continuous.zip -d frozen-continuous
      - name: Run nested decomposition
        run: |
          python analysis/decompose_nested_visible_variance.py \
            --head-table frozen-continuous/aggregated/primary_trait_continuous_head_with_metadata.csv \
            --out-dir nested-visible-variance \
            --bootstrap-repeats 2000 \
            --balanced-repeats 500 \
            --balanced-photos-per-species 10 \
            --seed 20260722
      - uses: actions/upload-artifact@v4
        with:
          name: ch1-nested-visible-variance
          path: nested-visible-variance
          retention-days: 90
