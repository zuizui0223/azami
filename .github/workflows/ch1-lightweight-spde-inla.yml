name: Ch1 lightweight per-trait SPDE-INLA environment analysis

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ch1-lightweight-spde-inla.yml"
      - "ch1_global/v2/80_merge_parallel_environment_layers.py"
      - "ch1_global/v2/83_run_lightweight_spde_inla.R"
  workflow_dispatch:
    inputs:
      source_run_id:
        description: Run containing successful environment layer artifacts
        required: true
        default: "29306454759"

permissions:
  actions: read
  contents: read

env:
  DEFAULT_SOURCE_RUN_ID: "29306454759"

jobs:
  lightweight-spde-inla:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudunits2-dev libgdal-dev libgeos-dev libproj-dev
      - name: Install Python dependencies
        run: python -m pip install pandas numpy
      - name: Install R dependencies
        shell: Rscript {0}
        run: |
          install.packages(c("Matrix", "sf"))
          install.packages(
            "INLA",
            repos = c(getOption("repos"), INLA = "https://inla.r-inla-download.org/R/stable"),
            dependencies = c("Depends", "Imports", "LinkingTo")
          )
      - name: Resolve source run
        id: params
        shell: bash
        run: |
          SOURCE_RUN_ID="${{ github.event.inputs.source_run_id }}"
          echo "source_run_id=${SOURCE_RUN_ID:-$DEFAULT_SOURCE_RUN_ID}" >> "$GITHUB_OUTPUT"
      - name: Download strict cohort
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.params.outputs.source_run_id }}
          name: ch1-strict-spatial-cohort-only-20260713
          path: strict_cohort
      - name: Download successful environment layers
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.params.outputs.source_run_id }}
          pattern: ch1-env-layer-*-20260713
          path: source/layers
          merge-multiple: false
      - name: Merge available environment layers
        run: |
          python ch1_global/v2/80_merge_parallel_environment_layers.py \
            --observation strict_cohort/strict_spatial_thinned_observations.csv \
            --layers-root source/layers \
            --out-dir enriched_environment \
            --min-raw-layers 6
      - name: Fit lightweight per-trait SPDE-INLA models
        run: |
          Rscript ch1_global/v2/83_run_lightweight_spde_inla.R \
            --environment enriched_environment/strict_spatial_thinned_with_climate_topography_soil.csv \
            --out-dir lightweight_spde_results \
            --min-species-n 5 \
            --cor-cutoff 0.85 \
            --mesh-max-edge-km 1000 \
            --mesh-cutoff-km 100 \
            --mesh-offset-km 1500
      - name: Upload compact results
        uses: actions/upload-artifact@v4
        with:
          name: ch1-lightweight-per-trait-spde-inla
          path: |
            lightweight_spde_results
            enriched_environment/parallel_environment_merge_report.json
            enriched_environment/environment_predictor_coverage.csv
          if-no-files-found: error
          retention-days: 90
