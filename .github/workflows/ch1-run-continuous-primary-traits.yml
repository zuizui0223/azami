name: Ch1 run continuous primary traits

on:
  workflow_dispatch:
    inputs:
      global_ai_analysis_artifact_id:
        description: Artifact containing frozen YOLO/head metadata
        required: true
        type: string
      output_label:
        description: Safe output label
        required: true
        default: continuous_primary_traits_v2
        type: string
      max_photos:
        description: Optional photo limit; 0 runs all retained photos
        required: true
        default: "0"
        type: string

permissions:
  actions: read
  contents: read

jobs:
  continuous-primary-traits:
    name: Rebuild and measure frozen retained heads
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      GLOBAL_ARTIFACT_ID: ${{ inputs.global_ai_analysis_artifact_id }}
      OUTPUT_LABEL: ${{ inputs.output_label }}
      MAX_PHOTOS: ${{ inputs.max_photos }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ch1_global/v2/requirements-submission.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ch1_global/v2/requirements-submission.txt
          python -m pip check

      - name: Validate request
        run: |
          python - <<'PY'
          import os
          import re

          artifact = os.environ["GLOBAL_ARTIFACT_ID"].strip().replace(",", "").replace("_", "")
          maximum = os.environ["MAX_PHOTOS"].strip()
          label = os.environ["OUTPUT_LABEL"].strip()
          if not re.fullmatch(r"[0-9]+", artifact) or int(artifact) < 1:
              raise SystemExit("global_ai_analysis_artifact_id must be a positive integer")
          if not re.fullmatch(r"[0-9]+", maximum):
              raise SystemExit("max_photos must be a non-negative integer")
          if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9._-]{0,79}", label):
              raise SystemExit("output_label is invalid")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"GLOBAL_ARTIFACT_ID={int(artifact)}\n")
              handle.write(f"MAX_PHOTOS={int(maximum)}\n")
              handle.write(f"OUTPUT_LABEL={label}\n")
          PY

      - name: Download frozen detector metadata artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p source/global
          curl --fail --location --retry 4 --retry-all-errors --retry-delay 2 \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${GLOBAL_ARTIFACT_ID}/zip" \
            --output source/global/global.zip
          unzip -tq source/global/global.zip
          unzip -q source/global/global.zip -d source/global/extracted
          YOLO_METADATA="$(find source/global/extracted -type f -name global_ai_merged_yolo_crop_metadata.csv -print -quit)"
          HEAD_METADATA="$(find source/global/extracted -type f -name ai_trait_head_level_with_metadata.csv -print -quit)"
          test -s "$YOLO_METADATA"
          test -s "$HEAD_METADATA"
          echo "YOLO_METADATA=$YOLO_METADATA" >> "$GITHUB_ENV"
          echo "HEAD_METADATA=$HEAD_METADATA" >> "$GITHUB_ENV"
          sha256sum "$YOLO_METADATA" "$HEAD_METADATA" | tee source/input_sha256.txt

      - name: Reconstruct head and context crops
        run: |
          set -euo pipefail
          extra_args=()
          if [ "$MAX_PHOTOS" -gt 0 ]; then
            extra_args+=(--max-photos "$MAX_PHOTOS")
          fi
          python ch1_global/v2/54_rebuild_global_continuous_trait_packet.py \
            --yolo-metadata "$YOLO_METADATA" \
            --out-dir rebuilt \
            --context-pad-ratio 1.5 \
            --timeout-sec 60 \
            --retries 4 \
            --sleep-sec 0.10 \
            --allow-failures \
            "${extra_args[@]}"

      - name: Require reconstruction coverage
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("rebuilt/continuous_trait_rebuild_report.json").read_text())
          input_heads = int(report["n_input_heads"])
          rebuilt_heads = int(report["n_rebuilt_heads"])
          coverage = rebuilt_heads / input_heads if input_heads else 0.0
          print({**report, "reconstruction_coverage": coverage})
          if input_heads < 1 or coverage < 0.90:
              raise SystemExit(f"Invalid reconstruction coverage: {coverage:.3f}")
          PY

      - name: Measure corrected continuous traits
        run: |
          python ch1_global/v2/56_run_primary_traits_continuous_v2.py \
            --packet-manifest rebuilt/continuous_trait_manifest.csv \
            --packet-root rebuilt \
            --out-dir continuous \
            --colour-confidence-floor 0.55 \
            --shape-confidence-floor 0.50 \
            --orientation-confidence-floor 0.65 \
            --flip-angle-tolerance 20

      - name: Aggregate observations and species
        run: |
          python ch1_global/v2/53_aggregate_primary_trait_continuous.py \
            --head-measurements continuous/primary_trait_continuous_head_measurements.csv \
            --head-metadata "$HEAD_METADATA" \
            --out-dir aggregated \
            --min-heads-per-observation 1 \
            --min-observations-per-species 3

      - name: Validate continuous outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          manifest = pd.read_csv("rebuilt/continuous_trait_manifest.csv", dtype=str, keep_default_na=False)
          heads = pd.read_csv("continuous/primary_trait_continuous_head_measurements.csv", low_memory=False)
          observations = pd.read_csv("aggregated/primary_trait_continuous_observation_level.csv", low_memory=False)
          species = pd.read_csv("aggregated/primary_trait_continuous_species_level.csv", low_memory=False)
          provenance = json.loads(Path("continuous/primary_trait_continuous_provenance.json").read_text())
          if len(heads) != len(manifest) or heads["annotation_unit_id"].duplicated().any():
              raise SystemExit("Head measurements do not match the reconstruction manifest")
          if observations.empty or species.empty:
              raise SystemExit("Observation or species aggregation is empty")
          if provenance.get("continuous_trait_version") != "v2":
              raise SystemExit("Production run did not use the corrected v2 measurement")
          forbidden = {
              "human_state", "capitulum_orientation", "corolla_colour_class",
              "capitulum_shape", "selection_stratum", "ai_candidate_state",
          }
          leaked = forbidden.intersection(heads.columns)
          if leaked:
              raise SystemExit(f"Obsolete categorical fields leaked into output: {sorted(leaked)}")
          print({
              "n_heads": len(heads),
              "n_observations": len(observations),
              "n_species": len(species),
              "usable_fraction": provenance["usable_fraction"],
          })
          PY

      - name: Record software environment
        run: |
          python -m pip freeze > continuous/python_environment.txt
          printf '%s\n' "$GITHUB_SHA" > continuous/git_sha.txt
          cp source/input_sha256.txt continuous/input_sha256.txt

      - name: Remove temporary image crops
        if: always()
        run: rm -rf rebuilt/head_crops rebuilt/context_crops

      - name: Upload continuous results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ch1-continuous-primary-traits-${{ env.OUTPUT_LABEL }}
          path: |
            continuous
            aggregated
            rebuilt/continuous_trait_manifest.csv
            rebuilt/continuous_trait_rebuild_report.json
            rebuilt/rebuild_status.csv
          if-no-files-found: warn
          retention-days: 90
