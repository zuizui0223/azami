name: Ch1 continuous primary traits CI

on:
  pull_request:
    branches: [main]
    paths:
      - ch1_global/v2/52_measure_primary_traits_continuous.py
      - ch1_global/v2/53_aggregate_primary_trait_continuous.py
      - ch1_global/v2/54_rebuild_global_continuous_trait_packet.py
      - ch1_global/v2/CONTINUOUS_PRIMARY_TRAITS.md
      - tests/test_ch1_continuous_primary_traits.py
      - .github/workflows/ch1-continuous-primary-traits-ci.yml
  push:
    branches: [main, feature/ch1-continuous-primary-traits]
    paths:
      - ch1_global/v2/52_measure_primary_traits_continuous.py
      - ch1_global/v2/53_aggregate_primary_trait_continuous.py
      - ch1_global/v2/54_rebuild_global_continuous_trait_packet.py
      - tests/test_ch1_continuous_primary_traits.py
      - .github/workflows/ch1-continuous-primary-traits-ci.yml

permissions:
  contents: read

jobs:
  test-continuous-traits:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas opencv-python-headless Pillow requests
      - name: Compile scripts
        run: |
          python -m py_compile \
            ch1_global/v2/52_measure_primary_traits_continuous.py \
            ch1_global/v2/53_aggregate_primary_trait_continuous.py \
            ch1_global/v2/54_rebuild_global_continuous_trait_packet.py
      - name: Run continuous-trait tests
        run: python -m unittest tests.test_ch1_continuous_primary_traits -v
