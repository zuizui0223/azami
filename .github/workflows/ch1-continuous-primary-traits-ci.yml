name: Ch1 continuous primary traits CI

on:
  pull_request:
    branches: [main]
    paths:
      - ch1_global/v2/52_measure_primary_traits_continuous.py
      - ch1_global/v2/53_aggregate_primary_trait_continuous.py
      - ch1_global/v2/54_rebuild_global_continuous_trait_packet.py
      - ch1_global/v2/55_run_primary_traits_continuous.py
      - ch1_global/v2/56_run_primary_traits_continuous_v2.py
      - ch1_global/v2/CONTINUOUS_PRIMARY_TRAITS.md
      - tests/test_ch1_continuous_primary_traits.py
      - .github/workflows/ch1-continuous-primary-traits-ci.yml
  push:
    branches: [main, feature/ch1-continuous-primary-traits, fix/ch1-continuous-traits-v2]
    paths:
      - ch1_global/v2/52_measure_primary_traits_continuous.py
      - ch1_global/v2/53_aggregate_primary_trait_continuous.py
      - ch1_global/v2/54_rebuild_global_continuous_trait_packet.py
      - ch1_global/v2/55_run_primary_traits_continuous.py
      - ch1_global/v2/56_run_primary_traits_continuous_v2.py
      - tests/test_ch1_continuous_primary_traits.py
      - .github/workflows/ch1-continuous-primary-traits-ci.yml

permissions:
  contents: read

jobs:
  test-continuous-traits:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas opencv-python-headless Pillow requests
      - name: Compile scripts
        run: |
          python -m py_compile \
            ch1_global/v2/52_measure_primary_traits_continuous.py \
            ch1_global/v2/53_aggregate_primary_trait_continuous.py \
            ch1_global/v2/54_rebuild_global_continuous_trait_packet.py \
            ch1_global/v2/55_run_primary_traits_continuous.py \
            ch1_global/v2/56_run_primary_traits_continuous_v2.py
      - name: Run continuous-trait tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p 'test_ch1_continuous_primary_traits.py' -v > continuous_trait_test_output.txt 2>&1
          status=$?
          cat continuous_trait_test_output.txt
          exit $status
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ch1-continuous-trait-test-diagnostics
          path: continuous_trait_test_output.txt
          if-no-files-found: error
          retention-days: 7
