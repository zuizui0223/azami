name: Ch1 extract CHELSA environment for global AI traits

on:
  workflow_dispatch:
    inputs:
      global_ai_trait_analysis_artifact_id:
        description: "Merged global AI trait analysis artifact ID"
        required: true
        default: "8099953404"
        type: string
      min_complete_fraction:
        description: "Minimum per-predictor nonmissing fraction among coordinate-eligible observations"
        required: true
        default: "0.98"
        type: string
      output_label:
        description: "Safe artifact label"
        required: true
        default: "research_grade_216_species_chelsa_v1"
        type: string

permissions:
  actions: read
  contents: read

jobs:
  extract-chelsa-environment:
    name: Extract predeclared CHELSA environment
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GDAL_DISABLE_READDIR_ON_OPEN: "EMPTY_DIR"
      GDAL_HTTP_MULTIRANGE: "YES"
      GDAL_HTTP_TIMEOUT: "120"
      GDAL_HTTP_MAX_RETRY: "4"
      GDAL_HTTP_RETRY_DELAY: "3"
      VSI_CACHE: "TRUE"
      VSI_CACHE_SIZE: "50000000"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install geospatial extraction dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas rasterio pyproj

      - name: Validate extraction request
        env:
          ARTIFACT_RAW: ${{ inputs.global_ai_trait_analysis_artifact_id }}
          COMPLETE_RAW: ${{ inputs.min_complete_fraction }}
          LABEL_RAW: ${{ inputs.output_label }}
        run: |
          python - <<'PY'
          import os
          import re
          artifact = (os.environ["ARTIFACT_RAW"] or "").strip().replace(",", "").replace("_", "")
          if not re.fullmatch(r"[0-9]+", artifact) or int(artifact) < 1:
              raise SystemExit("global_ai_trait_analysis_artifact_id must be a positive integer")
          try:
              complete = float(os.environ["COMPLETE_RAW"])
          except ValueError as error:
              raise SystemExit("min_complete_fraction must be numeric") from error
          if not 0 < complete <= 1:
              raise SystemExit("min_complete_fraction must be in (0, 1]")
          label = (os.environ["LABEL_RAW"] or "").strip()
          if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9._-]{0,79}", label):
              raise SystemExit("output_label is invalid")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"GLOBAL_AI_ANALYSIS_ARTIFACT_ID={int(artifact)}\n")
              handle.write(f"MIN_COMPLETE_FRACTION={complete}\n")
              handle.write(f"OUTPUT_LABEL={label}\n")
          PY

      - name: Download merged global AI trait analysis artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p source/global/extracted
          curl --fail --location --retry 4 --retry-all-errors --retry-delay 2 \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${GLOBAL_AI_ANALYSIS_ARTIFACT_ID}/zip" \
            --output source/global/global_ai.zip
          unzip -tq source/global/global_ai.zip
          unzip -q source/global/global_ai.zip -d source/global/extracted
          test -s source/global/extracted/global_ai_analysis_units/ai_trait_observation_level_long.csv
          test -s source/global/extracted/global_ai_analysis_units/ai_trait_observation_level_wide.csv

      - name: Extract CHELSA V2.1 core bioclim predictors
        run: |
          python ch1_global/v2/42_extract_chelsa_environment_for_ai_traits.py \
            --observation-long source/global/extracted/global_ai_analysis_units/ai_trait_observation_level_long.csv \
            --observation-wide source/global/extracted/global_ai_analysis_units/ai_trait_observation_level_wide.csv \
            --registry ch1_global/v2/ontology/ch1_environment_predictor_registry.json \
            --out-dir global_ai_chelsa_environment \
            --min-complete-fraction "$MIN_COMPLETE_FRACTION" \
            --sample-batch-size 512

      - name: Validate environmental analysis tables
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          root = Path("global_ai_chelsa_environment")
          metadata = pd.read_csv(root / "global_ai_observation_environment_metadata.csv", dtype=str, keep_default_na=False)
          long = pd.read_csv(root / "global_ai_trait_observation_environment_long.csv", dtype=str, keep_default_na=False)
          wide = pd.read_csv(root / "global_ai_trait_observation_environment_wide.csv", dtype=str, keep_default_na=False)
          qc = pd.read_csv(root / "chelsa_environment_extraction_qc.csv", dtype=str, keep_default_na=False)
          provenance = json.loads((root / "environment_analysis_provenance.json").read_text(encoding="utf-8"))
          predictors = ["env_chelsa_bio01_native", "env_chelsa_bio04_native", "env_chelsa_bio12_native", "env_chelsa_bio15_native"]
          if len(metadata) != metadata["obs_id"].nunique() or len(wide) != wide["obs_id"].nunique():
              raise SystemExit("Environment metadata/wide table must have one row per observation")
          if long.duplicated(["obs_id", "trait_id"]).any():
              raise SystemExit("Environment long table duplicates obs_id/trait_id")
          if len(long) != len(metadata) * 8:
              raise SystemExit("Environment long table must retain eight traits per observation")
          if not set(predictors).issubset(metadata.columns) or not set(predictors).issubset(long.columns) or not set(predictors).issubset(wide.columns):
              raise SystemExit("Primary CHELSA predictor columns are missing")
          if len(qc) != 4 or not provenance["semantic_status"].startswith("Environmental covariates joined"):
              raise SystemExit("CHELSA QC/provenance is incomplete")
          if not long["sampling_scope"].str.contains("Research-grade global Cirsium", regex=False).all():
              raise SystemExit("Outdated pilot sampling_scope remains in enriched table")
          summary = {
              "n_observations": int(len(metadata)),
              "n_environment_primary_complete": int(metadata["environment_primary_complete"].astype(str).str.lower().isin(["true", "1", "yes"]).sum()),
              "n_long_rows": int(len(long)),
              "predictors": predictors,
          }
          (root / "environment_run_summary.json").write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          PY
          {
            echo "## CHELSA environment extraction"
            echo
            echo '```json'
            cat global_ai_chelsa_environment/environment_run_summary.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload environmental analysis artifact
        uses: actions/upload-artifact@v4
        with:
          name: ch1-global-ai-trait-environment-${{ inputs.output_label }}
          path: global_ai_chelsa_environment
          if-no-files-found: error
          retention-days: 90
