name: "Ch1 submission extensions: modules niche lability"

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: Successful grouped SPDE-INLA workflow run
        required: true
        default: "29339137476"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ch1-submission-extensions.yml"
      - "ch1_global/v2/84_trait_modules_and_niche.py"
      - "ch1_global/v2/86_trait_lability_screen.py"

permissions:
  actions: read
  contents: read

env:
  DEFAULT_SOURCE_RUN_ID: "29339137476"

jobs:
  submission-extensions:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install pandas numpy scikit-learn
      - name: Resolve source run
        id: params
        shell: bash
        run: |
          RUN_ID="${{ github.event.inputs.source_run_id }}"
          echo "run_id=${RUN_ID:-$DEFAULT_SOURCE_RUN_ID}" >> "$GITHUB_OUTPUT"
      - name: Download grouped SPDE-INLA artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.params.outputs.run_id }}
          name: ch1-lightweight-per-trait-spde-inla
          path: source
      - name: Locate canonical inputs
        id: files
        shell: bash
        run: |
          set -euo pipefail
          ENV_FILE=$(find source -type f -name strict_spatial_thinned_with_climate_topography_soil.csv | head -n1)
          FIXED_FILE=$(find source -type f -name spde_fixed_effects_by_group.csv | head -n1)
          STABILITY_FILE=$(find source -type f -name spde_effect_stability_across_groups.csv | head -n1)
          HYPER_FILE=$(find source -type f -name spde_hyperparameters_by_group.csv | head -n1)
          test -n "$ENV_FILE" && test -n "$FIXED_FILE" && test -n "$STABILITY_FILE"
          echo "environment=$ENV_FILE" >> "$GITHUB_OUTPUT"
          echo "fixed=$FIXED_FILE" >> "$GITHUB_OUTPUT"
          echo "stability=$STABILITY_FILE" >> "$GITHUB_OUTPUT"
          echo "hyper=$HYPER_FILE" >> "$GITHUB_OUTPUT"
      - name: Run trait-module and niche analyses
        run: |
          python ch1_global/v2/84_trait_modules_and_niche.py \
            --environment "${{ steps.files.outputs.environment }}" \
            --spde-fixed "${{ steps.files.outputs.fixed }}" \
            --out-dir submission_extensions
      - name: Screen candidate trait lability and conservatism
        run: |
          python ch1_global/v2/86_trait_lability_screen.py \
            --environment "${{ steps.files.outputs.environment }}" \
            --spde-fixed "${{ steps.files.outputs.fixed }}" \
            --spde-stability "${{ steps.files.outputs.stability }}" \
            --spde-hyper "${{ steps.files.outputs.hyper }}" \
            --out-dir submission_extensions \
            --min-species-n 5 \
            --bootstrap-repeats 200
      - uses: actions/upload-artifact@v4
        with:
          name: ch1-trait-modules-niche-and-lability
          path: submission_extensions
          if-no-files-found: error
          retention-days: 90
