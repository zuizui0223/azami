name: Ch1 one-off exhaustive within-species climate analysis 20260713

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SOURCE_RUN_ID: "29216617585"
      SOURCE_ARTIFACT_NAME: "ch1-exhaustive-continuous-merged-all_photos_20260711_v1-recovery"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ch1_global/v2/requirements-submission.txt

      - name: Install analysis dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy scipy statsmodels rasterio pyproj
          python -m pip check

      - name: Download final exhaustive merged artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ env.SOURCE_RUN_ID }}
          name: ${{ env.SOURCE_ARTIFACT_NAME }}
          path: source/final

      - name: Locate strict spatial cohort
        run: |
          set -euo pipefail
          mapfile -t matches < <(find source/final -type f -name strict_spatial_thinned_observations.csv | sort)
          test "${#matches[@]}" -eq 1
          echo "STRICT_COHORT=${matches[0]}" >> "$GITHUB_ENV"
          wc -l "${matches[0]}"

      - name: Run exhaustive within-species climate analysis
        run: |
          python ch1_global/v2/75_run_exhaustive_within_species_climate_analysis.py \
            --observation "$STRICT_COHORT" \
            --out-dir exhaustive_within_species \
            --min-species-model-n 5 \
            --sample-batch-size 1024

      - name: Validate outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd
          report = json.loads(Path("exhaustive_within_species/exhaustive_within_species_climate_report.json").read_text())
          models = pd.read_csv("exhaustive_within_species/exhaustive_within_species_climate_models.csv")
          diagnostics = pd.read_csv("exhaustive_within_species/species_within_analysis_diagnostics.csv")
          if report["input_observations"] != 46276:
              raise SystemExit(f"Unexpected strict spatial cohort size: {report['input_observations']}")
          if report["input_species"] != 259:
              raise SystemExit(f"Unexpected strict spatial cohort species count: {report['input_species']}")
          if len(models) != 36:
              raise SystemExit(f"Expected 36 models, found {len(models)}")
          if diagnostics["taxon_name"].nunique() != 259:
              raise SystemExit("Species diagnostics do not cover all 259 taxa")
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Upload compact analysis results
        uses: actions/upload-artifact@v4
        with:
          name: ch1-exhaustive-within-species-climate-analysis-20260713
          path: |
            exhaustive_within_species/exhaustive_within_species_climate_report.json
            exhaustive_within_species/exhaustive_within_species_climate_models.csv
            exhaustive_within_species/species_within_analysis_diagnostics.csv
          if-no-files-found: error
          retention-days: 90
